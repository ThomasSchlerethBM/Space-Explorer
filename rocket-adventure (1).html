<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Rocket Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  #nameOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #nameOverlay.active { display: flex; }
  #nameBox {
    background: #0a0a1a;
    border: 2px solid #4af;
    border-radius: 16px;
    padding: 40px 60px;
    text-align: center;
    color: #fff;
  }
  #nameBox h2 { font-size: 28px; margin-bottom: 10px; color: #4af; }
  #nameBox p { color: #aaa; margin-bottom: 20px; font-size: 14px; }
  #nameInput {
    background: rgba(255,255,255,0.08);
    border: 2px solid #4af;
    border-radius: 8px;
    color: #fff;
    font-size: 24px;
    padding: 10px 20px;
    text-align: center;
    outline: none;
    width: 100%;
    font-family: 'Courier New', monospace;
  }
  #nameInput:focus { border-color: #8df; box-shadow: 0 0 12px rgba(100,200,255,0.4); }
  #nameSubmit {
    margin-top: 20px;
    background: linear-gradient(135deg, #2a6fff, #0a3fa0);
    border: none; border-radius: 8px;
    color: #fff; font-size: 18px;
    padding: 12px 40px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #nameSubmit:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(100,180,255,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="nameOverlay">
  <div id="nameBox">
    <h2>🏆 GAME OVER</h2>
    <p id="scoreDisplay">Level 1 | 0 Kronen</p>
    <p>Dein Name für die Bestenliste:</p>
    <input id="nameInput" type="text" maxlength="14" placeholder="DEIN NAME" autocomplete="off" spellcheck="false">
    <br>
    <button id="nameSubmit">EINTRAGEN ▶</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  FIREBASE CONFIG  ← hier deine Firebase-Daten eintragen
// ═══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "",
  authDomain:        "",
  databaseURL:       "",   // z.B. "https://mein-projekt-default-rtdb.firebaseio.com"
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};
// Falls leer → localStorage-Fallback
const USE_FIREBASE = Object.values(FIREBASE_CONFIG).every(v => v !== "");

// ═══════════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════
const keys     = {};
const justDown = {};

window.addEventListener('keydown', e => {
  const skip = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'];
  if (skip.includes(e.code)) e.preventDefault();
  if (!keys[e.code]) justDown[e.code] = true;
  keys[e.code] = true;
  handleNameKey(e);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function clearJust() { for (const k in justDown) delete justDown[k]; }

// ═══════════════════════════════════════════════════════════════════
//  GAME STATES
// ═══════════════════════════════════════════════════════════════════
const S = {
  MENU:        'menu',
  LAUNCH:      'launch',
  SPACE:       'space',
  APPROACHING: 'approaching',
  SURFACE:     'surface',
  GAMEOVER:    'gameover',
  BOARD:       'board'
};

let gs = S.MENU; // game state

// ═══════════════════════════════════════════════════════════════════
//  GAME GLOBALS
// ═══════════════════════════════════════════════════════════════════
let level = 1, lives = 3, crowns = 0;
let currentPlanet = 'earth';
let inRocket = true;
let crownFX = [];     // floating crown animations
let hitFX   = [];     // hit flash particles

// ═══════════════════════════════════════════════════════════════════
//  STARS (static once)
// ═══════════════════════════════════════════════════════════════════
const STARS = Array.from({length: 300}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.8 + 0.3,
  b: Math.random()
}));

// ═══════════════════════════════════════════════════════════════════
//  PLANET DEFS
// ═══════════════════════════════════════════════════════════════════
const PLANET_DATA = {
  earth: {
    name: 'Erde', skyTop: '#000820', skyBot: '#1a6abf',
    ground: '#2c6e1a', groundTop: '#3d9622',
    gravity: 0.38, color: '#3a7de0', accent: '#1a4ba0'
  },
  moon: {
    name: 'Mond', skyTop: '#000', skyBot: '#080818',
    ground: '#888', groundTop: '#aaa',
    gravity: 0.18, color: '#bbb', accent: '#999'
  },
  monster: {
    name: 'Monsterplanet', skyTop: '#0a0005', skyBot: '#1a001a',
    ground: '#3a0808', groundTop: '#5a0a0a',
    gravity: 0.5, color: '#8B0000', accent: '#500'
  }
};

// Space layout
const SPACE_PLANETS = [
  { id: 'earth',   rx: 0.18, ry: 0.78, r: 58 },
  { id: 'moon',    rx: 0.52, ry: 0.28, r: 38 },
  { id: 'monster', rx: 0.82, ry: 0.62, r: 52 }
];

// ═══════════════════════════════════════════════════════════════════
//  ROCKET (launch phase)
// ═══════════════════════════════════════════════════════════════════
const rkt = {
  x: 0, y: 0, vx: 0, vy: 0,
  angle: 0, power: 0,
  onGround: true, thrusting: false
};

// ═══════════════════════════════════════════════════════════════════
//  SPACESHIP (space phase)
// ═══════════════════════════════════════════════════════════════════
const ship = { x: 0, y: 0, vx: 0, vy: 0, angle: 0 };

// ═══════════════════════════════════════════════════════════════════
//  CHARACTER
// ═══════════════════════════════════════════════════════════════════
const hero = {
  x: 0, y: 0, vx: 0, vy: 0,
  w: 18, h: 30,
  onGround: false,
  facing: 1,
  shield: false,
  invTimer: 0,
  shootTimer: 0
};

// ═══════════════════════════════════════════════════════════════════
//  SURFACE WORLD
// ═══════════════════════════════════════════════════════════════════
const WORLD_W = 2400;
let camX = 0;

// Rocket on surface
const srkt = { x: 0, y: 0, w: 24, h: 48 };

let platforms    = [];
let monsters     = [];
let pProjectiles = []; // player water shots
let mProjectiles = []; // monster shots

function groundY() { return H - 90; }

// ═══════════════════════════════════════════════════════════════════
//  LEVEL CONFIG
// ═══════════════════════════════════════════════════════════════════
function monsterCount() {
  if (level >= 100) return 1; // boss only
  return Math.min(2 + Math.floor(level / 4), 18);
}
function monsterSpeed() { return 0.6 + Math.min(level * 0.04, 3.0); }
function monsterShootInterval() { return Math.max(180 - level * 1.5, 60); }

// ═══════════════════════════════════════════════════════════════════
//  APPROACHING TRANSITION
// ═══════════════════════════════════════════════════════════════════
let approachPlanet = null;
let approachT = 0;

// ═══════════════════════════════════════════════════════════════════
//  LEADERBOARD
// ═══════════════════════════════════════════════════════════════════
let leaderboard = [];
let lbLoaded = false;

try {
  leaderboard = JSON.parse(localStorage.getItem('rktAdv_lb') || '[]');
} catch(e) { leaderboard = []; }

async function submitScore(name) {
  const entry = {
    name: name.trim().toUpperCase() || 'ANONYM',
    level: Math.min(level, 100),
    crowns,
    ts: Date.now()
  };
  leaderboard.push(entry);
  leaderboard.sort((a,b) => b.crowns - a.crowns || b.level - a.level);
  leaderboard = leaderboard.slice(0, 20);
  try { localStorage.setItem('rktAdv_lb', JSON.stringify(leaderboard)); } catch(e) {}

  if (USE_FIREBASE) {
    try {
      // Dynamically load Firebase
      const { initializeApp }         = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getDatabase, ref, push, get, query, orderByChild, limitToLast }
                                       = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js');
      const app = initializeApp(FIREBASE_CONFIG, 'rktAdv');
      const db  = getDatabase(app);
      await push(ref(db, 'rktScores'), entry);
      const snap = await get(query(ref(db, 'rktScores'), orderByChild('crowns'), limitToLast(20)));
      if (snap.exists()) {
        leaderboard = Object.values(snap.val()).sort((a,b) => b.crowns - a.crowns || b.level - a.level);
      }
    } catch(err) { console.warn('Firebase-Fehler:', err); }
  }

  lbLoaded = true;
  gs = S.BOARD;
}

// ═══════════════════════════════════════════════════════════════════
//  NAME INPUT OVERLAY
// ═══════════════════════════════════════════════════════════════════
const nameOverlay = document.getElementById('nameOverlay');
const nameInput   = document.getElementById('nameInput');
const nameSubmit  = document.getElementById('nameSubmit');
const scoreDisp   = document.getElementById('scoreDisplay');

function showNameInput() {
  scoreDisp.textContent = `Level ${Math.min(level,100)} | 👑 ${crowns} Kronen`;
  nameInput.value = '';
  nameOverlay.classList.add('active');
  nameInput.focus();
}
function hideNameInput() {
  nameOverlay.classList.remove('active');
}
nameSubmit.addEventListener('click', async () => {
  if (!nameInput.value.trim()) return;
  hideNameInput();
  await submitScore(nameInput.value);
});
function handleNameKey(e) {
  if (nameOverlay.classList.contains('active') && e.key === 'Enter') {
    nameSubmit.click();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  START / RESET
// ═══════════════════════════════════════════════════════════════════
function startGame() {
  level = 1; lives = 3; crowns = 0;
  currentPlanet = 'earth';
  crownFX = []; hitFX = [];
  setupLaunch();
}

function setupLaunch() {
  gs = S.LAUNCH;
  currentPlanet = 'earth';
  rkt.x = W / 2; rkt.y = groundY() - 48;
  rkt.vx = 0; rkt.vy = 0;
  rkt.angle = 0; rkt.power = 0;
  rkt.onGround = true; rkt.thrusting = false;
  inRocket = true;
}

let approachCooldown = 0;

function enterSpace(fromId) {
  gs = S.SPACE;
  const p = SPACE_PLANETS.find(p => p.id === fromId);
  // Schiff startet in der Mitte des Bildschirms (sichtbar, weg vom Planeten)
  ship.x = W * 0.5;
  ship.y = H * 0.5;
  ship.vx = 0;    // Schwerelosigkeit: kein Schwung beim Start
  ship.vy = 0;
  ship.angle = 0;
  approachCooldown = 240; // 4 Sek. bevor Landung ausgeloest werden kann
  shipTrail = [];
}

function startApproach(planet) {
  approachPlanet = planet;
  approachT = 0;
  gs = S.APPROACHING;
}

function setupSurface(planetId) {
  currentPlanet = planetId;
  inRocket = true;

  const gy = groundY();

  // Surface rocket position (center-ish)
  srkt.x = WORLD_W / 2 - srkt.w / 2;
  srkt.y = gy - srkt.h;

  // Hero
  hero.x = srkt.x - 30;
  hero.y = gy - hero.h;
  hero.vx = 0; hero.vy = 0;
  hero.onGround = true;
  hero.facing = 1;
  hero.invTimer = 0;
  hero.shootTimer = 0;
  hero.shield = false;

  camX = Math.max(0, hero.x - W / 2);

  // Build platforms (deterministic per level)
  const rng = mulberry32(level * 31337 + planetId.length);
  platforms = [];
  // main ground handled in render
  const count = 6 + Math.floor(level / 8);
  for (let i = 0; i < count; i++) {
    platforms.push({
      x: 150 + i * (WORLD_W / count) * rng(),
      y: gy - 60 - rng() * 160,
      w: 80 + rng() * 120,
      h: 18
    });
  }

  // Monsters
  monsters = [];
  pProjectiles = [];
  mProjectiles = [];

  if (planetId === 'monster') {
    const mc = monsterCount();
    for (let i = 0; i < mc; i++) {
      spawnMonster(i, mc, level >= 100);
    }
  }

  gs = S.SURFACE;
}

function spawnMonster(i, total, isBoss) {
  const gy = groundY();
  const mw = isBoss ? 90 : 36;
  const mh = isBoss ? 90 : 38;
  const hp = isBoss ? 20 : 2;
  const spd = isBoss ? 0.4 : monsterSpeed();

  monsters.push({
    x: 300 + i * ((WORLD_W - 500) / Math.max(total - 1, 1)),
    y: gy - mh,
    vx: (i % 2 === 0 ? 1 : -1) * spd,
    vy: 0,
    w: mw, h: mh,
    hp, maxHp: hp, hits: 0,
    shootTimer: 60 + i * 30,
    isBoss,
    dead: false, deadTimer: 0,
    color: isBoss ? '#7a0000' : '#3a7a00',
    eyeColor: isBoss ? '#ff4400' : '#ff2222'
  });
}

// Deterministic RNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════════════════════════
//  PHYSICS HELPERS
// ═══════════════════════════════════════════════════════════════════
function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function circRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx+rw));
  const nearY = Math.max(ry, Math.min(cy, ry+rh));
  return (cx-nearX)**2 + (cy-nearY)**2 < cr*cr;
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════
function update() {
  switch(gs) {
    case S.MENU:        updateMenu();        break;
    case S.LAUNCH:      updateLaunch();      break;
    case S.SPACE:       updateSpace();       break;
    case S.APPROACHING: updateApproaching(); break;
    case S.SURFACE:     updateSurface();     break;
    case S.GAMEOVER:    updateGameOver();    break;
    case S.BOARD:       updateBoard();       break;
  }

  // Crown FX
  crownFX = crownFX.filter(c => {
    c.y -= 1.2; c.life--;
    return c.life > 0;
  });
  // Hit FX
  hitFX = hitFX.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life--; return p.life > 0;
  });
  clearJust();
}

function updateMenu() {
  if (justDown['Space'] || justDown['Enter'] || justDown['KeyA']) startGame();
}

// ─── LAUNCH ──────────────────────────────────────────────────────
function updateLaunch() {
  const GRAV = 0.22;
  const pd = PLANET_DATA.earth;

  if (rkt.onGround) {
    if (keys['ArrowLeft'])  rkt.x -= 3;
    if (keys['ArrowRight']) rkt.x += 3;
    rkt.x = Math.max(30, Math.min(W-30, rkt.x));
  }

  rkt.thrusting = false;
  if (keys['ArrowUp']) {
    rkt.thrusting = true;
    rkt.power = Math.min(rkt.power + 0.18, 14);
    const thrust = 0.35;
    rkt.vx += Math.sin(rkt.angle) * thrust;
    rkt.vy -= Math.cos(rkt.angle) * thrust;
    if (rkt.onGround && rkt.power > 2.5) rkt.onGround = false;
  } else {
    rkt.power = Math.max(0, rkt.power - 0.3);
  }

  if (!rkt.onGround) {
    if (keys['ArrowLeft'])  { rkt.angle -= 0.04; rkt.vx -= 0.08; }
    if (keys['ArrowRight']) { rkt.angle += 0.04; rkt.vx += 0.08; }
    rkt.vy += GRAV;
    rkt.vx *= 0.985;
    rkt.vy *= 0.992;
    rkt.x += rkt.vx;
    rkt.y += rkt.vy;

    const gy = groundY() - 48;
    if (rkt.y >= gy) {
      rkt.y = gy; rkt.vy = 0; rkt.vx = 0;
      rkt.angle = 0; rkt.onGround = true; rkt.power = 0;
    }
    if (rkt.x < 0)  rkt.x = 0;
    if (rkt.x > W)  rkt.x = W;

    if (rkt.y < -80) {
      enterSpace('earth');
    }
  }
}

// ─── SPACE ───────────────────────────────────────────────────────
function updateSpace() {
  if (approachCooldown > 0) approachCooldown--;

  if (keys['ArrowLeft'])  ship.angle -= 0.045;
  if (keys['ArrowRight']) ship.angle += 0.045;
  if (keys['ArrowUp']) {
    ship.vx += Math.sin(ship.angle) * 0.12;
    ship.vy -= Math.cos(ship.angle) * 0.12;
  }
  // Echter Weltraum: minimale Bremsung (fast Schwerelosigkeit)
  ship.vx *= 0.9995;
  ship.vy *= 0.9995;
  // Geschwindigkeit leicht begrenzen damit man nicht zu schnell wird
  const spd = Math.hypot(ship.vx, ship.vy);
  if (spd > 6) { ship.vx = ship.vx/spd*6; ship.vy = ship.vy/spd*6; }
  ship.x += ship.vx;
  ship.y += ship.vy;

  // Wrap
  if (ship.x < -20)  ship.x = W + 20;
  if (ship.x > W+20) ship.x = -20;
  if (ship.y < -20)  ship.y = H + 20;
  if (ship.y > H+20) ship.y = -20;

  // Planetennaehe - nur wenn Abklingzeit abgelaufen
  if (approachCooldown <= 0) {
    for (const sp of SPACE_PLANETS) {
      const px = sp.rx * W, py = sp.ry * H;
      const d  = Math.hypot(ship.x - px, ship.y - py);
      if (d < sp.r + 45) {
        startApproach(sp);
        return;
      }
    }
  }
}

// ─── APPROACHING ─────────────────────────────────────────────────
function updateApproaching() {
  approachT += 0.018;
  if (approachT >= 1) {
    setupSurface(approachPlanet.id);
  }
}

// ─── SURFACE ─────────────────────────────────────────────────────
function updateSurface() {
  const pd  = PLANET_DATA[currentPlanet];
  const gy  = groundY();

  if (inRocket) {
    // In rocket on surface
    if (justDown['KeyA']) {
      // Exit rocket
      inRocket = false;
      hero.x = srkt.x + srkt.w + 5;
      hero.y = srkt.y + srkt.h - hero.h;
    }
    if (keys['ArrowUp']) {
      // Re-launch
      enterSpace(currentPlanet);
      return;
    }
    return;
  }

  // ── Character movement ──
  hero.vx = 0;
  if (keys['ArrowLeft'])  { hero.vx = -3.5; hero.facing = -1; }
  if (keys['ArrowRight']) { hero.vx =  3.5; hero.facing =  1; }

  if (justDown['Space'] && hero.onGround) {
    hero.vy = -(7 + (1 - pd.gravity) * 2);
  }

  hero.shield = keys['KeyS'];

  // Shoot water
  if (keys['KeyW'] && hero.shootTimer <= 0) {
    pProjectiles.push({
      x: hero.x + (hero.facing > 0 ? hero.w + 2 : -10),
      y: hero.y + hero.h * 0.35,
      vx: hero.facing * 9,
      vy: 0, life: 70, r: 6
    });
    hero.shootTimer = 14;
    // small splash FX
    for (let i = 0; i < 4; i++) hitFX.push({
      x: hero.x + hero.w/2, y: hero.y + hero.h/2,
      vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
      life: 12, color: '#4af'
    });
  }
  if (hero.shootTimer > 0) hero.shootTimer--;

  // Board rocket
  if (justDown['KeyA']) {
    const d = Math.hypot(hero.x - srkt.x, hero.y - srkt.y);
    if (d < 80) {
      inRocket = true;
      return;
    }
  }

  // Apply gravity
  hero.vy += pd.gravity;
  hero.x += hero.vx;
  hero.y += hero.vy;

  // Bounds
  if (hero.x < 0) hero.x = 0;
  if (hero.x + hero.w > WORLD_W) hero.x = WORLD_W - hero.w;

  // Ground collision
  hero.onGround = false;
  // Main ground
  if (hero.y + hero.h >= gy) {
    hero.y = gy - hero.h;
    hero.vy = 0;
    hero.onGround = true;
  }
  // Platforms
  for (const pl of platforms) {
    if (hero.vx || hero.vy >= 0) {
      if (overlap(hero.x, hero.y, hero.w, hero.h, pl.x, pl.y, pl.w, pl.h)) {
        const prevBottom = hero.y + hero.h - hero.vy;
        if (prevBottom <= pl.y + 4 && hero.vy >= 0) {
          hero.y = pl.y - hero.h;
          hero.vy = 0;
          hero.onGround = true;
        }
      }
    }
  }

  // Camera
  camX = Math.max(0, Math.min(WORLD_W - W, hero.x + hero.w/2 - W/2));

  if (hero.invTimer > 0) hero.invTimer--;

  // ── Player projectiles ──
  pProjectiles = pProjectiles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    return p.life > 0 && p.x > 0 && p.x < WORLD_W;
  });

  // ── Monsters ──
  for (const m of monsters) {
    if (m.dead) { m.deadTimer++; continue; }

    // Move
    m.x += m.vx;
    if (m.x < 40 || m.x + m.w > WORLD_W - 40) m.vx *= -1;

    // Gravity (stick to ground)
    m.vy += pd.gravity;
    m.y += m.vy;
    if (m.y + m.h >= gy) { m.y = gy - m.h; m.vy = 0; }

    // Shoot at player
    m.shootTimer--;
    if (m.shootTimer <= 0) {
      m.shootTimer = monsterShootInterval();
      const mx = m.x + m.w/2, my = m.y + m.h/2;
      const hx = hero.x + hero.w/2, hy = hero.y + hero.h/2;
      const dx = hx - mx, dy = hy - my;
      const dist = Math.hypot(dx, dy) || 1;
      const spd = m.isBoss ? 5 : 3.5 + level * 0.03;
      mProjectiles.push({
        x: mx, y: my,
        vx: (dx/dist)*spd, vy: (dy/dist)*spd,
        life: 130, r: m.isBoss ? 9 : 5
      });
    }

    // Hit by player water
    for (let i = pProjectiles.length-1; i >= 0; i--) {
      const p = pProjectiles[i];
      if (circRect(p.x, p.y, p.r, m.x, m.y, m.w, m.h)) {
        pProjectiles.splice(i, 1);
        m.hits++;
        // Splash FX
        for (let j = 0; j < 6; j++) hitFX.push({
          x: p.x, y: p.y,
          vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
          life: 20, color: '#4af'
        });
        if (m.hits >= m.maxHp) {
          m.dead = true;
          crowns++;
          crownFX.push({ x: m.x + m.w/2, y: m.y, life: 80 });
          for (let j = 0; j < 10; j++) hitFX.push({
            x: m.x + m.w/2, y: m.y + m.h/2,
            vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
            life: 35, color: m.isBoss ? '#ffd700' : '#88f'
          });
        }
      }
    }
  }
  monsters = monsters.filter(m => !(m.dead && m.deadTimer > 40));

  // ── Monster projectiles ──
  mProjectiles = mProjectiles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) return false;

    // Hit ground
    if (p.y > gy) return false;

    // Hit player
    if (hero.invTimer <= 0) {
      // Shield blocks shots coming from the front
      if (hero.shield) {
        const frontX = hero.facing > 0 ? hero.x + hero.w : hero.x - 12;
        if (circRect(p.x, p.y, p.r, frontX - 4, hero.y - 8, 10, hero.h + 16)) {
          for (let j = 0; j < 5; j++) hitFX.push({
            x: p.x, y: p.y,
            vx: (Math.random()-0.5)*4, vy: -(Math.random()*3),
            life: 18, color: '#4df'
          });
          return false;
        }
      }

      if (circRect(p.x, p.y, p.r, hero.x, hero.y, hero.w, hero.h)) {
        lives--;
        hero.invTimer = 130;
        for (let j = 0; j < 8; j++) hitFX.push({
          x: hero.x + hero.w/2, y: hero.y + hero.h/2,
          vx: (Math.random()-0.5)*6, vy: -(Math.random()*4+1),
          life: 28, color: '#f44'
        });
        if (lives <= 0) {
          gs = S.GAMEOVER;
          return false;
        }
        return false;
      }
    }
    return true;
  });

  // Level complete (all monsters on monster planet killed)
  if (currentPlanet === 'monster' && monsters.length === 0) {
    level++;
    // Celebrate then return to space
    if (level > 100) {
      gs = S.GAMEOVER; // Won!
    } else {
      enterSpace(currentPlanet);
    }
  }
}

function updateGameOver() {
  // handled by overlay
}
function updateBoard() {
  if (justDown['Space'] || justDown['Enter']) {
    lbLoaded = false;
    startGame();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
let frame = 0;
function render() {
  frame++;
  ctx.clearRect(0, 0, W, H);
  switch(gs) {
    case S.MENU:        renderMenu();        break;
    case S.LAUNCH:      renderLaunch();      break;
    case S.SPACE:       renderSpace();       break;
    case S.APPROACHING: renderApproaching(); break;
    case S.SURFACE:     renderSurface();     break;
    case S.GAMEOVER:    renderGameOver();    break;
    case S.BOARD:       renderBoard();       break;
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────
function drawStars(alpha = 1) {
  ctx.save();
  for (const s of STARS) {
    const twinkle = 0.5 + 0.5 * Math.sin(frame * 0.02 + s.b * 100);
    ctx.globalAlpha = alpha * (0.3 + s.b * 0.7) * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawRocket(x, y, angle, thrust) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Flame
  if (thrust) {
    const fh = 14 + Math.sin(frame * 0.3) * 8 + (rkt.power || 6) * 1.2;
    const fg = ctx.createLinearGradient(0, 12, 0, 12+fh);
    fg.addColorStop(0,  'rgba(255,255,200,1)');
    fg.addColorStop(0.3,'rgba(255,160,0,0.9)');
    fg.addColorStop(1,  'rgba(255,60,0,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(-7, 12);
    ctx.lineTo( 7, 12);
    ctx.lineTo( 0, 12+fh);
    ctx.closePath();
    ctx.fill();
  }

  // Body
  ctx.fillStyle = '#dde5f0';
  ctx.beginPath();
  ctx.moveTo( 0, -22);
  ctx.lineTo(11, 12);
  ctx.lineTo(-11,12);
  ctx.closePath();
  ctx.fill();

  // Stripe
  ctx.fillStyle = '#c00';
  ctx.fillRect(-11, 2, 22, 5);

  // Nose
  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.moveTo( 0,-22);
  ctx.lineTo( 6, -4);
  ctx.lineTo(-6, -4);
  ctx.closePath();
  ctx.fill();

  // Porthole
  ctx.fillStyle = '#4af';
  ctx.strokeStyle = '#89c';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 2, 5, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Fins
  ctx.fillStyle = '#8899bb';
  ctx.beginPath();
  ctx.moveTo(11,12); ctx.lineTo(20,22); ctx.lineTo(11,18);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-11,12); ctx.lineTo(-20,22); ctx.lineTo(-11,18);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

// Exhaust trail particles for space
let shipTrail = [];

function drawSpaceRocket(x, y, angle, thrusting) {
  // Add trail particle when thrusting
  if (thrusting) {
    const tailX = x - Math.sin(angle) * 18;
    const tailY = y + Math.cos(angle) * 18;
    shipTrail.push({ x: tailX, y: tailY, life: 22, r: 3 + Math.random()*3 });
  }
  // Always add tiny drift trail
  if (frame % 3 === 0) {
    const tailX = x - Math.sin(angle) * 14;
    const tailY = y + Math.cos(angle) * 14;
    shipTrail.push({ x: tailX, y: tailY, life: 10, r: 1.5 });
  }
  // Draw trail
  shipTrail = shipTrail.filter(p => {
    p.life--;
    const a = p.life / 22;
    ctx.globalAlpha = a * 0.6;
    ctx.fillStyle = thrusting ? `rgba(255,${Math.floor(120+a*100)},0,1)` : 'rgba(100,160,255,0.5)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2); ctx.fill();
    return p.life > 0;
  });
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Glow halo around ship
  const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, 22);
  halo.addColorStop(0, 'rgba(80,180,255,0.15)');
  halo.addColorStop(1, 'transparent');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();

  if (thrusting) {
    const fh = 12 + Math.sin(frame*0.4)*6;
    const fg = ctx.createLinearGradient(0, 8, 0, 8+fh);
    fg.addColorStop(0, 'rgba(255,255,200,1)');
    fg.addColorStop(0.4, 'rgba(255,160,0,0.9)');
    fg.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(-5, 8); ctx.lineTo(5, 8); ctx.lineTo(0, 8+fh);
    ctx.closePath(); ctx.fill();
  }

  // Body
  ctx.fillStyle = '#dde5f0';
  ctx.beginPath();
  ctx.moveTo(0,-16); ctx.lineTo(8,8); ctx.lineTo(-8,8);
  ctx.closePath(); ctx.fill();

  // Red stripe
  ctx.fillStyle = '#c00';
  ctx.fillRect(-8, 2, 16, 4);

  // Nose
  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.moveTo(0,-16); ctx.lineTo(4,-4); ctx.lineTo(-4,-4);
  ctx.closePath(); ctx.fill();

  // Porthole (glowing)
  ctx.fillStyle = '#4af';
  ctx.shadowColor = '#4af'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(0, 1, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Fins
  ctx.fillStyle = '#8899bb';
  ctx.beginPath(); ctx.moveTo(8,8); ctx.lineTo(14,16); ctx.lineTo(8,13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-8,8); ctx.lineTo(-14,16); ctx.lineTo(-8,13); ctx.closePath(); ctx.fill();

  ctx.restore();
}


function drawMonsterSprite(m, sx) {
  ctx.save();
  ctx.translate(sx + m.w/2, m.y);
  if (m.dead) ctx.globalAlpha = 1 - m.deadTimer/40;

  const pulse = Math.sin(frame * 0.08) * 3;

  if (m.isBoss) {
    // Boss body
    ctx.fillStyle = '#6a0000';
    ctx.beginPath();
    ctx.roundRect(-m.w/2, 0, m.w, m.h, 8);
    ctx.fill();

    ctx.fillStyle = '#300';
    ctx.fillRect(-m.w/2, 0, m.w, 20);

    // Spikes
    ctx.fillStyle = '#900';
    for (let i = 0; i < 5; i++) {
      const sx2 = -m.w/2 + 8 + i * 16;
      ctx.beginPath();
      ctx.moveTo(sx2, 0);
      ctx.lineTo(sx2+6, -12 - pulse);
      ctx.lineTo(sx2+12, 0);
      ctx.closePath();
      ctx.fill();
    }

    // Eyes
    const eyeGlow = ctx.createRadialGradient(-20, 22, 0, -20, 22, 12);
    eyeGlow.addColorStop(0, '#ff8800');
    eyeGlow.addColorStop(1, '#ff2200');
    ctx.fillStyle = eyeGlow;
    ctx.beginPath(); ctx.arc(-20, 22, 12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 20, 22, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-20, 22, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 20, 22, 5, 0, Math.PI*2); ctx.fill();

    // Mouth
    ctx.strokeStyle = '#f40';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 55, 20, 0, Math.PI);
    ctx.stroke();

    // Teeth
    ctx.fillStyle = '#fff';
    for (let i = -3; i <= 3; i++) {
      ctx.fillRect(i*7 - 3, 53, 5, 8);
    }

    // Health bar
    ctx.fillStyle = '#222';
    ctx.fillRect(-m.w/2, -16, m.w, 8);
    const pct = (m.maxHp - m.hits) / m.maxHp;
    const hbg = ctx.createLinearGradient(-m.w/2, 0, m.w/2, 0);
    hbg.addColorStop(0, '#f00'); hbg.addColorStop(1, '#fa0');
    ctx.fillStyle = hbg;
    ctx.fillRect(-m.w/2, -16, m.w * pct, 8);

    ctx.font = '14px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(`HP ${m.maxHp - m.hits}/${m.maxHp}`, 0, -18);
    ctx.fillText('👿 ENDGEGNER', 0, m.h + 16);

  } else {
    // Regular monster
    const mc = m.vx > 0 ? 1 : -1;
    ctx.scale(mc, 1);

    // Body
    ctx.fillStyle = m.color;
    ctx.beginPath();
    ctx.roundRect(-m.w/2 + 2, 8, m.w - 4, m.h - 8, 6);
    ctx.fill();

    // Head
    ctx.fillStyle = m.hits > 0 ? '#226600' : '#44aa00';
    ctx.beginPath();
    ctx.arc(0, 10 + pulse*0.3, 16, 0, Math.PI*2);
    ctx.fill();

    // Horns
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.moveTo(-8, 0); ctx.lineTo(-6, -10-pulse); ctx.lineTo(-3, 0);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo( 8, 0); ctx.lineTo( 6, -10-pulse); ctx.lineTo( 3, 0);
    ctx.closePath(); ctx.fill();

    // Eyes
    ctx.fillStyle = m.eyeColor;
    ctx.beginPath(); ctx.arc(-6, 8, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6, 8, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-6, 8, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6, 8, 2.5, 0, Math.PI*2); ctx.fill();

    // Mouth
    ctx.strokeStyle = '#300';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5, 16); ctx.lineTo(5, 16);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    for (let i=-2; i<=2; i+=2) ctx.fillRect(i-1, 14, 2, 4);

    // Hit indicator
    if (m.hits > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('💧', 0, -5);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── MENU ────────────────────────────────────────────────────────
function renderMenu() {
  // Deep space BG
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
  bg.addColorStop(0, '#04042a');
  bg.addColorStop(1, '#000010');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  drawStars();

  // Logo
  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = '#4af'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(W*0.09, 72)}px 'Courier New'`;
  ctx.fillText('🚀 ROCKET ADVENTURE', W/2, H/2 - 120);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#4af';
  ctx.font = `${Math.min(W*0.035, 28)}px 'Courier New'`;
  ctx.fillText('LEERTASTE / ENTER zum Starten', W/2, H/2 - 50);

  ctx.fillStyle = '#778';
  ctx.font = `${Math.min(W*0.022, 17)}px 'Courier New'`;
  const tips = [
    '↑ Schub  |  ← → Lenken  |  A Ein-/Aussteigen',
    'W: Wasser schießen  |  S: Schild  |  SPACE: Springen',
    '100 Level  •  3 Planeten  •  Kronen sammeln'
  ];
  tips.forEach((t, i) => ctx.fillText(t, W/2, H/2 + 20 + i*32));

  // Animated rocket on menu
  drawRocket(W/2, H/2 + 170 + Math.sin(frame*0.04)*10, Math.sin(frame*0.02)*0.15, true);

  ctx.restore();
}

// ─── LAUNCH ──────────────────────────────────────────────────────
function renderLaunch() {
  // Sky gradient
  const t = Math.max(0, Math.min(1, (groundY() - rkt.y) / (H * 0.9)));
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, `rgb(${Math.floor(t*4)},${Math.floor(t*4)},${Math.floor(20+t*150)})`);
  sky.addColorStop(0.5, `rgb(${Math.floor(30+t*70)},${Math.floor(80+t*120)},${Math.floor(120+t*100)})`);
  sky.addColorStop(1, '#87CEEB');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  if (t > 0.3) drawStars(t * 0.8);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 4; i++) {
    const cx2 = ((i * 280 + frame * 0.3) % (W+100)) - 50;
    const cy  = 100 + i * 70;
    ctx.beginPath(); ctx.ellipse(cx2, cy, 60, 28, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+40, cy-10, 40, 22, 0, 0, Math.PI*2); ctx.fill();
  }

  // Ground
  const gg = ctx.createLinearGradient(0, groundY()-10, 0, H);
  gg.addColorStop(0, '#3d9622');
  gg.addColorStop(0.15, '#2c6e1a');
  gg.addColorStop(1, '#1a4010');
  ctx.fillStyle = gg;
  ctx.fillRect(0, groundY()-10, W, H - groundY()+10);

  // Ground detail
  ctx.fillStyle = '#5ab532';
  for (let i = 0; i < W; i += 18) {
    ctx.fillRect(i, groundY()-18, 8, 12);
  }

  drawRocket(rkt.x, rkt.y, rkt.angle, rkt.thrusting);
  drawHUD();

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '15px Courier New';
  ctx.fillText('↑ Schub halten zum Abheben  |  ← → Lenken/Drehen', W/2, H - 12);
}

// ─── SPACE ───────────────────────────────────────────────────────
function renderSpace() {
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Nebula effects
  for (let i = 0; i < 3; i++) {
    const nx = (0.15 + i * 0.35) * W;
    const ny = (0.3  + i * 0.2)  * H;
    const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, 120);
    const cols = ['rgba(100,50,200,0.06)','rgba(50,100,200,0.06)','rgba(200,50,100,0.05)'];
    ng.addColorStop(0, cols[i]); ng.addColorStop(1, 'transparent');
    ctx.fillStyle = ng;
    ctx.fillRect(0, 0, W, H);
  }

  // Planets
  for (const sp of SPACE_PLANETS) {
    const px = sp.rx * W, py = sp.ry * H;
    const pd = PLANET_DATA[sp.id];

    // Glow halo (separate fill, no clip)
    const glow = ctx.createRadialGradient(px, py, sp.r*0.4, px, py, sp.r*2.2);
    glow.addColorStop(0, pd.color + '44'); glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(px, py, sp.r*2.2, 0, Math.PI*2); ctx.fill();

    // Planet body
    const pg = ctx.createRadialGradient(px - sp.r*0.35, py - sp.r*0.35, 0, px, py, sp.r);
    pg.addColorStop(0, pd.accent); pg.addColorStop(1, pd.color);
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(px, py, sp.r, 0, Math.PI*2); ctx.fill();

    // Surface stripe – kein ctx.clip(), stattdessen: save → clip-path definieren → fill → restore
    ctx.save();
    ctx.beginPath(); ctx.arc(px, py, sp.r, 0, Math.PI*2); ctx.clip();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(px - sp.r, py - 7, sp.r*2, 14);
    ctx.globalAlpha = 1;
    ctx.restore();

    // Monster planet: eerie red atmosphere band
    if (sp.id === 'monster') {
      ctx.save();
      ctx.beginPath(); ctx.arc(px, py, sp.r, 0, Math.PI*2); ctx.clip();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#ff2200';
      ctx.fillRect(px - sp.r, py + sp.r*0.2, sp.r*2, sp.r*0.4);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Moon: rings
    if (sp.id === 'moon') {
      ctx.strokeStyle = 'rgba(200,200,200,0.35)';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(px, py, sp.r+18, 8, 0.3, 0, Math.PI*2); ctx.stroke();
    }

    // Proximity pulse ring (nur wenn Abklingzeit vorbei)
    if (approachCooldown <= 0) {
      const d = Math.hypot(ship.x - px, ship.y - py);
      if (d < sp.r + 120) {
        const t2 = Math.max(0, 1 - (d - sp.r) / 120);
        ctx.strokeStyle = `rgba(255,255,100,${t2 * 0.8})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.arc(px, py, sp.r + 12 + Math.sin(frame*0.1)*4, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // Label
    ctx.fillStyle = '#ddeeff';
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowColor = pd.color; ctx.shadowBlur = 8;
    ctx.fillText(pd.name, px, py + sp.r + 20);
    ctx.shadowBlur = 0;
  }

  // Ship
  drawSpaceRocket(ship.x, ship.y, ship.angle, keys['ArrowUp']);
  drawHUD();

  // Approach indicator text
  if (approachCooldown <= 0) {
    for (const sp of SPACE_PLANETS) {
      const px = sp.rx * W, py = sp.ry * H;
      const d  = Math.hypot(ship.x - px, ship.y - py);
      if (d < sp.r + 120) {
        const t2 = 1 - (d - sp.r) / 120;
        ctx.fillStyle = `rgba(255,255,150,${t2})`;
        ctx.font = 'bold 16px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('▼ Landung nähert sich...', px, py - sp.r - 24);
      }
    }
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '14px Courier New';
  ctx.fillText('↑ Schub  |  ← → Drehen  |  Planeten annähern zum Landen', W/2, H - 12);

  // Abklingzeit-Anzeige
  if (approachCooldown > 0) {
    ctx.fillStyle = 'rgba(255,200,80,0.7)';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText('Triebwerke kühlen ab... ' + Math.ceil(approachCooldown/60) + 's', W/2, H - 32);
  }
}

// ─── APPROACHING ─────────────────────────────────────────────────
function renderApproaching() {
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  drawStars(1 - approachT * 0.5);

  const pd = PLANET_DATA[approachPlanet.id];
  const r  = approachPlanet.r * (1 + approachT * 14);

  const pg = ctx.createRadialGradient(W/2 - r*0.3, H/2 - r*0.3, 0, W/2, H/2, r);
  pg.addColorStop(0, pd.accent); pg.addColorStop(1, pd.color);
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(W/2, H/2, r, 0, Math.PI*2); ctx.fill();

  ctx.save();
  ctx.globalAlpha = approachT;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`Landung: ${pd.name}`, W/2, 50);
  ctx.fillStyle = '#adf';
  ctx.font = '18px Courier New';
  ctx.fillText(`Level ${level}`, W/2, 82);
  ctx.restore();
}

// ─── SURFACE ─────────────────────────────────────────────────────
function renderSurface() {
  const pd  = PLANET_DATA[currentPlanet];
  const gy  = groundY();

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, pd.skyTop);
  sky.addColorStop(1, pd.skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  if (currentPlanet !== 'earth') drawStars(0.6);
  if (currentPlanet === 'earth') {
    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 3; i++) {
      const cx2 = ((i * 340 + frame * 0.15) % (W+80)) - 40;
      ctx.beginPath(); ctx.ellipse(cx2, 80 + i*50, 55, 22, 0, 0, Math.PI*2); ctx.fill();
    }
  }
  if (currentPlanet === 'monster') {
    // Eerie fog at ground level
    const fog = ctx.createLinearGradient(0, gy - 60, 0, gy);
    fog.addColorStop(0, 'transparent');
    fog.addColorStop(1, 'rgba(80,0,0,0.5)');
    ctx.fillStyle = fog; ctx.fillRect(0, gy-60, W, 60);
  }

  ctx.save();
  ctx.translate(-camX, 0);

  // Ground
  const gg = ctx.createLinearGradient(0, gy-12, 0, H);
  gg.addColorStop(0,   pd.groundTop);
  gg.addColorStop(0.1, pd.ground);
  gg.addColorStop(1,   '#111');
  ctx.fillStyle = gg;
  ctx.fillRect(0, gy-12, WORLD_W, H - gy + 12);

  // Ground texture
  ctx.fillStyle = pd.groundTop;
  for (let x = 0; x < WORLD_W; x += 22) {
    ctx.fillRect(x, gy-14, 10, 6);
  }

  // Platforms
  for (const pl of platforms) {
    ctx.fillStyle = pd.ground;
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.fillStyle = pd.groundTop;
    ctx.fillRect(pl.x, pl.y, pl.w, 6);
  }

  // Surface rocket
  drawRocket(srkt.x + srkt.w/2, srkt.y + srkt.h * 0.7, 0, false);

  // Character
  if (!inRocket) {
    drawHero2(hero.x, hero.y);
  }

  // Monsters
  for (const m of monsters) {
    const sx = m.x - m.w/2; // screen x for drawMonsterSprite offset
    drawMonsterSprite(m, m.x);
  }

  // Player projectiles (water)
  ctx.save();
  for (const p of pProjectiles) {
    const wg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    wg.addColorStop(0, 'rgba(200,240,255,1)');
    wg.addColorStop(0.5,'rgba(80,180,255,0.8)');
    wg.addColorStop(1,'rgba(40,120,255,0.2)');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(p.x - p.vx*1.5, p.y, p.r*0.6, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // Monster projectiles
  for (const p of mProjectiles) {
    const mg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    mg.addColorStop(0, '#ffe040');
    mg.addColorStop(0.5,'#ff6000');
    mg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }

  // Crown FX
  ctx.font = '28px Arial';
  ctx.textAlign = 'center';
  for (const c of crownFX) {
    ctx.globalAlpha = c.life / 80;
    ctx.fillText('👑', c.x, c.y);
  }
  ctx.globalAlpha = 1;

  // Hit particles
  for (const p of hitFX) {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore(); // end camX translate

  drawHUD();

  // Hints
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '13px Courier New';
  if (inRocket) {
    ctx.fillText('A: Aussteigen  |  ↑: Abheben', W/2, H-12);
  } else {
    ctx.fillText('← → Laufen  |  SPACE Springen  |  W Wasser  |  S Schild  |  A Rakete besteigen (nah sein)', W/2, H-12);
  }

  // Planet / monster count
  ctx.fillStyle = '#cdf';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(pd.name, 12, H-12);
  if (currentPlanet === 'monster' && monsters.length > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f88';
    ctx.font = 'bold 16px Courier New';
    ctx.fillText(`👾 Monster übrig: ${monsters.length}`, W/2, 36);
  }
  if (currentPlanet === 'monster' && monsters.length === 0 && !inRocket) {
    ctx.fillStyle = '#8f8';
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Level geschafft! Zur Rakete!', W/2, H/2 - 20);
  }
}

// drawHero2: called inside the camX translate, so uses world coords
function drawHero2(wx, wy) {
  const blink = hero.invTimer > 0 && Math.floor(frame/5) % 2 === 0;
  if (blink) return;

  const f = hero.facing;
  const cx = wx + hero.w/2;

  // Legs
  ctx.fillStyle = '#1a3d6e';
  const legSwing = hero.onGround && (keys['ArrowLeft'] || keys['ArrowRight'])
    ? Math.sin(frame * 0.25) * 4 : 0;
  ctx.fillRect(cx - 4 + (f>0 ? legSwing : -legSwing), wy+20, 6, 10);
  ctx.fillRect(cx + 1 + (f>0 ? -legSwing : legSwing), wy+20, 6, 10);
  ctx.fillStyle = '#111';
  ctx.fillRect(cx - 4 + (f>0 ? legSwing : -legSwing), wy+29, 7, 4);
  ctx.fillRect(cx + 1 + (f>0 ? -legSwing : legSwing), wy+29, 7, 4);

  // Body suit
  ctx.fillStyle = '#2356a0';
  ctx.beginPath();
  ctx.roundRect(cx-7, wy+8, 14, 14, 3);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-2, wy+10, 4, 8);

  // Arms
  ctx.fillStyle = '#2356a0';
  ctx.fillRect(f>0 ? cx+7 : cx-12, wy+10, 5, 9);
  ctx.fillRect(f>0 ? cx-12 : cx+7, wy+11, 5, 8);

  // Head
  ctx.fillStyle = '#ffd0b0';
  ctx.beginPath(); ctx.arc(cx, wy+3, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a5fa0';
  ctx.beginPath(); ctx.arc(cx, wy+2, 7, Math.PI, 0); ctx.fill();
  ctx.fillStyle = 'rgba(100,200,255,0.6)';
  ctx.beginPath(); ctx.arc(cx, wy+4, 5, Math.PI, 0); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(cx-2, wy+1, 2, 0, Math.PI*2); ctx.fill();

  // Shield
  if (hero.shield) {
    const shx = f > 0 ? cx+14 : cx-14;
    ctx.strokeStyle = 'rgba(80,200,255,0.85)';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#4af'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(shx, wy+12, 18, -Math.PI*0.6, Math.PI*0.6, f < 0);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ─── HUD ─────────────────────────────────────────────────────────
function drawHUD() {
  // Semi-transparent top bar
  ctx.fillStyle = 'rgba(0,0,10,0.55)';
  ctx.fillRect(0, 0, W, 48);

  // Hearts
  ctx.font = '26px Arial';
  ctx.textAlign = 'right';
  for (let i = 0; i < 3; i++) {
    ctx.fillText(i < lives ? '❤️' : '🖤', W - 10 - i * 34, 34);
  }

  // Crowns
  ctx.font = 'bold 18px Courier New';
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'left';
  ctx.fillText('👑 ' + crowns, 12, 32);

  // Level
  ctx.fillStyle = '#adf';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + Math.min(level, 100), W/2, 32);

  // Progress bar (level 1–100)
  const barW = 120, barH = 5;
  const bx = W/2 - barW/2, by = 40;
  ctx.fillStyle = '#223';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = '#4af';
  ctx.fillRect(bx, by, barW * (Math.min(level, 100) / 100), barH);
}

// ─── GAME OVER ───────────────────────────────────────────────────
let goShown = false;
function renderGameOver() {
  if (!goShown) {
    goShown = true;
    showNameInput();
  }

  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  drawStars(0.4);

  ctx.textAlign = 'center';
  ctx.fillStyle = level > 100 ? '#ffd700' : '#ff4444';
  ctx.font = `bold ${Math.min(W*0.1, 72)}px Courier New`;
  ctx.shadowColor = level > 100 ? '#fa0' : '#f00';
  ctx.shadowBlur = 30;
  ctx.fillText(level > 100 ? '🏆 GEWONNEN!' : 'GAME OVER', W/2, H/2 - 60);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#adf';
  ctx.font = '22px Courier New';
  ctx.fillText(`Level ${Math.min(level,100)}  |  👑 ${crowns} Kronen`, W/2, H/2);
}

// ─── LEADERBOARD ─────────────────────────────────────────────────
function renderBoard() {
  goShown = false;
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  drawStars(0.5);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 38px Courier New';
  ctx.shadowColor = '#fa0'; ctx.shadowBlur = 20;
  ctx.fillText('🏆 BESTENLISTE', W/2, 70);
  ctx.shadowBlur = 0;

  const medals = ['🥇', '🥈', '🥉'];
  const top = leaderboard.slice(0, 10);

  top.forEach((e, i) => {
    const y = 130 + i * 48;
    const isTop = i < 3;

    ctx.fillStyle = i === 0 ? 'rgba(255,215,0,0.12)'
                 : i === 1 ? 'rgba(192,192,192,0.1)'
                 : i === 2 ? 'rgba(205,127,50,0.1)' : 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.roundRect(W/2 - 280, y-28, 560, 40, 8);
    ctx.fill();

    ctx.fillStyle = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#99b';
    ctx.font = isTop ? 'bold 20px Courier New' : '16px Courier New';
    const medal = isTop ? medals[i] : `${i+1}.`;
    ctx.fillText(
      `${medal}  ${e.name.padEnd(12)}  Lv.${String(e.level).padStart(3)}  👑${e.crowns}`,
      W/2, y
    );
  });

  if (top.length === 0) {
    ctx.fillStyle = '#556';
    ctx.font = '20px Courier New';
    ctx.fillText('Noch keine Einträge', W/2, 200);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '16px Courier New';
  ctx.fillText('ENTER / SPACE → Neues Spiel', W/2, H - 30);
}

// ═══════════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════════
// One-shot trigger for GAMEOVER overlay
let prevState = gs;

function loop() {
  // Trigger name input on state transition into GAMEOVER
  if (gs === S.GAMEOVER && prevState !== S.GAMEOVER) {
    goShown = false;
  }
  prevState = gs;

  update();
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
