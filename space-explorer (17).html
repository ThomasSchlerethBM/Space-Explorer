// ═══════════════════════════════════════════════════════════════════
//  WEB AUDIO – Space Theme
// ═══════════════════════════════════════════════════════════════════
let audioCtx = null, musicPlaying = false, muted = false;
let masterGain, musicNodes = [];

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); masterGain.gain.value = 0.32;
    masterGain.connect(audioCtx.destination);
  } catch(e) { console.warn('Audio nicht verfügbar:', e); }
}

function startMusic() {
  if (musicPlaying || muted) return;
  try {
    initAudio();
    if (!audioCtx) return;
    // Resume context if suspended (browser autoplay policy)
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => { musicPlaying = true; playSpaceTheme(); });
    } else {
      musicPlaying = true; playSpaceTheme();
    }
  } catch(e) { console.warn('Musik-Fehler:', e); }
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop && n.stop(); } catch(e){} });
  musicNodes = []; musicPlaying = false;
}

function setMute(m) {
  muted = m;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (audioCtx) masterGain.gain.value = muted ? 0 : 0.32;
  if (!muted && !musicPlaying) startMusic();
}

// ── Beruhigende Piano-Musik (Web Audio API) ─────────────────────
// Zwei Schichten: sanfte Piano-Melodie + weicher Bass-Pad
// Tonart: C-Dur pentatonisch – immer harmonisch, nie dissonant

function playSpaceTheme() {
  if (!audioCtx || muted) return;

  // C-Dur Pentatonik (Hz) – über 3 Oktaven
  const P = [
    130.81, 146.83, 164.81, 196.00, 220.00,   // C3 D3 E3 G3 A3
    261.63, 293.66, 329.63, 392.00, 440.00,   // C4 D4 E4 G4 A4
    523.25, 587.33, 659.26, 783.99, 880.00    // C5 D5 E5 G5 A5
  ];

  // Melodie-Muster (Indizes in P[]) – ruhig, aufsteigend/absteigend
  const MEL = [
    5,7,9,10, 9,7,5,4,  5,7,9,12, 10,9,7,5,
    6,8,10,12,10,8,6,5, 7,9,10,9, 7,5,4,5
  ];
  // Bass-Muster (tiefe Töne, Indizes in P[])
  const BASS = [0,0,2,0, 1,1,0,1, 0,2,0,1, 2,0,1,0];

  const BEAT = 0.52;   // etwas langsamer = beruhigend
  const LOOK = 6;      // Lookahead in Beats

  // ── Piano-Ton (weicher Anschlag via ADSR) ──────────────────────
  function piano(freq, when, dur, vol=0.12) {
    if (!audioCtx) return;
    // Zwei leicht verstimmte Oszillatoren = Piano-Chorus-Effekt
    [0, 0.5].forEach(detune => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.value = freq * (1 + detune/1000);
      // ADSR: sehr kurzer Attack, langer natürlicher Decay
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(vol, when + 0.02);       // Attack
      g.gain.linearRampToValueAtTime(vol * 0.6, when + 0.08); // Decay
      g.gain.linearRampToValueAtTime(vol * 0.35, when + dur * 0.5); // Sustain
      g.gain.linearRampToValueAtTime(0, when + dur);           // Release
      o.connect(g); g.connect(masterGain);
      o.start(when); o.stop(when + dur + 0.05);
      musicNodes.push(o);
    });
  }

  // ── Oberton-Schimmer (verleiht Piano-Charakter) ────────────────
  function pianoBell(freq, when, vol=0.04) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freq * 4; // 4. Harmonische
    g.gain.setValueAtTime(vol, when);
    g.gain.exponentialRampToValueAtTime(0.001, when + 0.6);
    o.connect(g); g.connect(masterGain);
    o.start(when); o.stop(when + 0.65);
    musicNodes.push(o);
  }

  // ── Sanfter Bass-Pad (Sine-Welle = wärmster Klang) ────────────
  function bassPad(freq, when, dur, vol=0.10) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freq * 0.5; // eine Oktave tiefer
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.4);
    g.gain.linearRampToValueAtTime(vol * 0.8, when + dur - 0.4);
    g.gain.linearRampToValueAtTime(0, when + dur);
    o.connect(g); g.connect(masterGain);
    o.start(when); o.stop(when + dur + 0.1);
    musicNodes.push(o);
  }

  // ── Akkord-Begleitung (alle 4 Beats) ──────────────────────────
  function chord(rootFreq, when, dur) {
    // Quinten-Intervall (perfekt harmonisch)
    [1, 1.5, 2].forEach((ratio, i) => {
      const vol = [0.06, 0.04, 0.03][i];
      bassPad(rootFreq * ratio, when, dur, vol);
    });
  }

  // ── Haupt-Scheduler-Schleife ───────────────────────────────────
  let step = 0;
  let t = audioCtx.currentTime + 0.1;

  function tick() {
    if (!musicPlaying) return;
    const now = audioCtx.currentTime;
    while (t < now + LOOK * BEAT) {
      const mi   = step % MEL.length;
      const bi   = step % BASS.length;
      const freq = P[MEL[mi]];

      // Melodie-Note
      piano(freq, t, BEAT * 0.88);
      pianoBell(freq, t);

      // Bass alle 4 Beats
      if (step % 4 === 0) {
        bassPad(P[BASS[bi]], t, BEAT * 4, 0.09);
      }
      // Akkord alle 8 Beats
      if (step % 8 === 0) {
        chord(P[BASS[bi]], t, BEAT * 8);
      }

      // Kleine Pause alle 16 Beats (musikalische Phrasierung)
      if ((step + 1) % 16 === 0) t += BEAT * 0.3;

      t += BEAT;
      step++;
    }
    setTimeout(tick, LOOK * BEAT * 450);
  }
  tick();
}

function playFX(freq, dur=0.1, type='square', vol=0.15) {
  if (!audioCtx || muted) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function playExplosion() {
  for (let i = 0; i < 6; i++) setTimeout(() => playFX(80 - i*10, 0.4, 'sawtooth', 0.3), i*120);
}

window.addEventListener('keydown', e => {
  const skip=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'];
  if (skip.includes(e.code)) e.preventDefault();
  if (!keys[e.code]) justDown[e.code]=true;
  keys[e.code]=true;
  // Dialog answers
  if(dialog){
    if(e.key==='j'||e.key==='J'){ e.preventDefault(); dialog.onY && dialog.onY(); }
    if((e.key==='n'||e.key==='N') && dialog.onN){ e.preventDefault(); dialog.onN(); }
  }
  // Math quiz input
  if(mathQuiz){ e.preventDefault(); handleMathKey(e.code, e.key); }
  // ESC closes quiz
  if(e.code==='Escape' && mathQuiz && mathQuiz.phase==='input') mathQuiz=null;
});
window.addEventListener('keyup', e => { keys[e.code]=false; });
function clearJust(){ for(const k in justDown) delete justDown[k]; }

// ─── Name Input ───────────────────────────────────────────────────
const nameOverlay = document.getElementById('nameOverlay');
document.getElementById('nameSubmit').addEventListener('click', async ()=>{
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  nameOverlay.classList.remove('active');
  await submitScore(name);
});
window.addEventListener('keydown', e=>{
  if (nameOverlay.classList.contains('active') && e.key==='Enter')
    document.getElementById('nameSubmit').click();
});

async function submitScore(name) {
  const entry = { name:name.toUpperCase()||'ANONYM', level:Math.min(level,100), crowns, ts:Date.now() };
  leaderboard.push(entry);
  leaderboard.sort((a,b)=>b.crowns-a.crowns||b.level-a.level);
  leaderboard = leaderboard.slice(0,20);
  saveLB();
  if (USE_FIREBASE) { /* firebase push logic omitted for brevity */ }
  gs = S.BOARD;
}

function showNameInput(title='💀 GAME OVER'){
  document.getElementById('goTitle').textContent = title;
  document.getElementById('goScore').textContent = `Level ${Math.min(level,100)} | 👑 ${crowns} Kronen`;
  document.getElementById('nameInput').value='';
  nameOverlay.classList.add('active');
  setTimeout(()=>document.getElementById('nameInput').focus(), 100);
}

function hexToRgba(hex, a){
  hex = hex.replace(/^#([a-f\d])([a-f\d])([a-f\d])$/i, (_,r,g,b)=>'#'+r+r+g+g+b+b);
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function overlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function circRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<cr*cr;
}
function mulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

  drawbridgeDown=false;

  if (planetId==='magma') {
    setupMagmaWorld(rng, gy);
  } else {
    // Reachable staircase platform chains (gravity-aware)
    buildReachablePlatforms(planetId, rng, gy, PLANET_DATA[planetId].gravity);
    // Spawn question blocks near/above platforms
    spawnQuestionBlocks(planetId, rng, gy);
    if (planetId==='monster') {
      const mc=Math.min(2+Math.floor(level/4),16);
      for(let i=0;i<mc;i++) spawnMonster(i,mc,false);
      // Every 10th level: spawn a mini-boss
      if (level%10===0 && level<100) spawnMiniBoss(level);
    }
  }
  gs=S.SURFACE;
}

// ─── MAGMA WORLD ─────────────────────────────────────────────────
const CASTLE_X = WORLD_W - 700;
const CASTLE_W = 600;
const MOAT_X   = CASTLE_X - 140;
const MOAT_W   = 120;

function setupMagmaWorld(rng, gy){
  // Magma holes – fewer (5), jumpable
  for(let i=0;i<5;i++){
    const hx = 300 + rng()*(MOAT_X-400);
    magmaHoles.push({ x:hx, y:gy-2, w:38+rng()*14, h:14 });
  }

  // === JUMP STAIRCASE ===
  // Staircase starts right of castle and climbs up LEFT to the castle top-right entrance
  // Castle right edge = CASTLE_X + CASTLE_W
  // Entrance height: gy - (CASTLE_H-60) = gy - 160
  const CASTLE_H = 220;
  const rightEdge = CASTLE_X + CASTLE_W;
  const entranceY  = gy - CASTLE_H + 60;  // height of right entrance (~gy-160)
  const steps = 10;
  // Each step: shift 120px to left, rise (entranceY-gy+60)/steps px
  const stepRise = (gy - 60 - entranceY) / (steps - 1); // ~11px per step
  const stepSpan = 130;

  for(let i=0;i<steps;i++){
    // Rightmost step is lowest, leftmost (step 9) is at entrance height
    platforms.push({
      x: rightEdge + 60 + (steps - 1 - i) * stepSpan,
      y: gy - 60 - i * stepRise,
      w: 110, h: 18
    });
  }

  // Extra platforms left of moat (approach zone)
  for(let i=0;i<5;i++){
    platforms.push({ x:150+i*230+rng()*50, y:gy-55-rng()*90, w:85+rng()*70, h:18 });
  }

  // Magma monsters
  const mc = 4 + Math.min(Math.floor(level*0.3), 8);
  for(let i=0;i<mc;i++){
    const sx = 200 + rng()*900;
    magmaMonsters.push({
      x:sx, y:gy-32, vx:(rng()>0.5?1:-1)*(0.5+rng()*0.3), vy:0,
      w:36, h:36, hp:10, maxHp:10, dead:false, deadTimer:0,
      shootTimer: 80+Math.floor(rng()*60),
      rage: 0   // increases as HP drops → gets faster & shoots more
    });
  }
}

// ─── MONSTER ─────────────────────────────────────────────────────
function spawnMonster(i,total,isBoss){
  const gy=groundY();
  const mw=isBoss?90:36, mh=isBoss?90:38, hp=isBoss?20:2;
  const spd=isBoss?0.4:0.6+Math.min(level*0.04,3.0);
  monsters.push({
    x:300+i*((WORLD_W-500)/Math.max(total-1,1)),
    y:gy-mh, vx:(i%2===0?1:-1)*spd, vy:0,
    w:mw, h:mh, hp, maxHp:hp, hits:0,
    shootTimer:60+i*30, isBoss,
    dead:false, deadTimer:0
  });
}

// ─── MINI-BOSS ───────────────────────────────────────────────────
function spawnMiniBoss(lvl){
  const gy=groundY();
  const tier = lvl/10;           // 1-9
  const hp   = 10 + tier*10;    // 20,30..90 HP
  const spd  = 1.0 + tier*0.25;
  const sz   = 54 + tier*4;
  monsters.push({
    x: WORLD_W*0.6, y: gy-sz,
    vx: spd, vy: 0,
    w: sz, h: sz,
    hp, maxHp:hp, hits:0,
    shootTimer: 50,
    isBoss:false, isMiniBoss:true, tier,
    dead:false, deadTimer:0,
    crownReward: 5 + tier*5   // 10,15..50 crowns
  });
}



// ─── REACHABLE PLATFORM BUILDER ──────────────────────────────────
// Creates 2-3 connected chains the hero can actually jump through.
// Max jump height ≈ 110px, comfortable ≈ 80px.
function buildReachablePlatforms(planetId, rng, gy, gravity=0.38){
  // Compute safe jump height for this planet's gravity
  // jumpPow = 7.5+(1-g)*3.5, maxH = jumpPow²/(2*g) * 0.75 (safety margin)
  const jumpPow  = 7.5 + (1 - gravity) * 3.5;
  const MAX_JUMP_H = Math.floor(jumpPow * jumpPow / (2 * gravity) * 0.72);
  const MAX_JUMP_W  = 190; // max horizontal gap
  const PLAT_W_MIN  = 100;
  const PLAT_W_MAX  = 190;
  const CHAINS      = 3 + Math.floor(level / 12);  // more chains at high levels
  const PH          = 16; // platform height

  // Split world into vertical sections for each chain
  const sectionW = (WORLD_W - 300) / CHAINS;

  for(let ch=0; ch<CHAINS; ch++){
    const startX = 150 + ch * sectionW + rng() * 80;
    const stepsPerChain = 4 + Math.floor(rng() * 4);  // 4-7 steps

    let cx = startX;
    let cy = gy - 70;   // start near ground

    for(let s=0; s<stepsPerChain; s++){
      const pw = PLAT_W_MIN + rng() * (PLAT_W_MAX - PLAT_W_MIN);

      platforms.push({ x:cx, y:cy, w:pw, h:PH });

      // Next platform: move up and sideways within jump range
      const upAmount  = Math.floor(MAX_JUMP_H * 0.55) + rng() * Math.floor(MAX_JUMP_H * 0.4);
      const sideDir   = (rng() > 0.35) ? 1 : -1;
      const sideShift = 50 + rng() * (MAX_JUMP_W - 70);

      cx = Math.max(80, Math.min(WORLD_W-200, cx + sideDir * sideShift));
      cy = Math.max(gy - 520, cy - upAmount);  // cap total height
    }
  }
}

// ─── QUESTION BLOCKS (Mario-Style) ───────────────────────────────
function spawnQuestionBlocks(planetId, rng, gy){
  const BW = 32, BH = 32;
  // Place question blocks directly ABOVE some platforms (guaranteed reachable!)
  const eligiblePlats = platforms.filter(p => p.y < gy - 60);
  const count = Math.min(eligiblePlats.length, Math.max(3, Math.floor(eligiblePlats.length * 0.45)));

  // Shuffle eligible platforms
  const shuffled = [...eligiblePlats].sort(() => rng()-0.5);

  for(let i=0; i<count; i++){
    const pl = shuffled[i % shuffled.length];
    const coins = (rng() < 0.25) ? 3 : 1;
    // Place block centered above the platform, at jump height
    const bx = pl.x + (pl.w - BW) * rng();  // somewhere along platform width
    const by = pl.y - BH - 48 - rng() * 16; // 48-64px above platform
    questionBlocks.push({
      x:Math.max(20, bx), y:Math.max(gy-600, by),
      w:BW, h:BH,
      coins, used:false,
      bounceTimer:0, bounceY:0,
      shimmer: Math.random()*Math.PI*2
    });
  }
}

function update(){
  switch(gs){
    case S.MENU:        updateMenu();        break;
    case S.LAUNCH:      updateLaunch();      break;
    case S.SPACE:       updateSpace();       break;
    case S.APPROACHING: updateApproaching(); break;
    case S.SURFACE:     updateSurface();     break;
    case S.BOSS:        updateBoss();        break;
    case S.BOSSWIN:     updateBossWin();     break;
    case S.GAMEOVER:    break;
    case S.BOARD:       updateBoard();       break;
  }
  crownFX=crownFX.filter(c=>{ c.y-=1.2; c.life--; return c.life>0; });
  hitFX=hitFX.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--; return p.life>0; });
  explosionFX=explosionFX.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.r*=0.93; p.life--; return p.life>0; });
  clearJust();
}

// ─── LAUNCH ──────────────────────────────────────────────────────
function updateLaunch(){
  if(rkt.onGround){
    if(keys['ArrowLeft']) rkt.x-=3;
    if(keys['ArrowRight']) rkt.x+=3;
    rkt.x=Math.max(30,Math.min(W-30,rkt.x));
  }
  rkt.thrusting=false;
  if(keys['ArrowUp']){
    rkt.thrusting=true;
    rkt.power=Math.min(rkt.power+0.18,14);
    const thrustMult = 1 + rocketLevel * 0.45;
    rkt.vx+=Math.sin(rkt.angle)*0.35*thrustMult;
    rkt.vy-=Math.cos(rkt.angle)*0.35*thrustMult;
    if(rkt.onGround&&rkt.power>2.5) rkt.onGround=false;
  } else { rkt.power=Math.max(0,rkt.power-0.3); }
  if(!rkt.onGround){
    if(keys['ArrowLeft']){ rkt.angle-=0.04; rkt.vx-=0.08; }
    if(keys['ArrowRight']){ rkt.angle+=0.04; rkt.vx+=0.08; }
    rkt.vy+=0.22; rkt.vx*=0.985; rkt.vy*=0.992;
    rkt.x+=rkt.vx; rkt.y+=rkt.vy;
    const gy=groundY()-48;
    if(rkt.y>=gy){ rkt.y=gy; rkt.vy=0; rkt.vx=0; rkt.angle=0; rkt.onGround=true; rkt.power=0; }
    if(rkt.x<0) rkt.x=0; if(rkt.x>W) rkt.x=W;
    if(rkt.y<-80) enterSpace('earth');
  }
}

// ─── SPACE ───────────────────────────────────────────────────────
function updateSpace(){
  if(approachCooldown>0) approachCooldown--;
  if(keys['ArrowLeft'])  ship.angle-=0.045;
  if(keys['ArrowRight']) ship.angle+=0.045;
  const thrustPow = kidsMode ? 0.06 : 0.12;
  const maxSpd    = kidsMode ? 3.0  : 6.0;
  if(keys['ArrowUp']){
    ship.vx+=Math.sin(ship.angle)*thrustPow;
    ship.vy-=Math.cos(ship.angle)*thrustPow;
    playFX(220,0.04,'sine',0.04);
  }
  ship.vx*=0.9995; ship.vy*=0.9995;
  const spd=Math.hypot(ship.vx,ship.vy);
  if(spd>maxSpd){ ship.vx=ship.vx/spd*maxSpd; ship.vy=ship.vy/spd*maxSpd; }
  ship.x+=ship.vx; ship.y+=ship.vy;
  if(ship.x<-20) ship.x=W+20;
  if(ship.x>W+20) ship.x=-20;
  if(ship.y<-20) ship.y=H+20;
  if(ship.y>H+20) ship.y=-20;
  if(approachCooldown<=0){
    for(const sp of SPACE_PLANETS){
      const d=Math.hypot(ship.x-sp.rx*W, ship.y-sp.ry*H);
      if(d<sp.r+45){ startApproach(sp); return; }
    }
  }
}

function updateApproaching(){

}

// ─── SURFACE ─────────────────────────────────────────────────────
function updateSurface(){
  const pd=PLANET_DATA[currentPlanet];
  const gy=groundY();

  if(inRocket){
    if(justDown['KeyA']){ inRocket=false; hero.x=srkt.x+srkt.w+5; hero.y=srkt.y+srkt.h-hero.h; }
    if(keys['ArrowUp']){ enterSpace(currentPlanet); return; }
    return;
  }

  // Movement
  hero.vx=0;
  const heroSpd = kidsMode ? 2.5 : 3.5;
  if(keys['ArrowLeft'])  { hero.vx=-heroSpd; hero.facing=-1; }
  if(keys['ArrowRight']) { hero.vx= heroSpd; hero.facing= 1; }
  if(justDown['Space']&&hero.onGround){
    // Jump strength compensates for gravity so all planets feel fair
    const jumpPow = 7.5 + (1-pd.gravity)*3.5;
    hero.vy = -jumpPow;
    playFX(440,0.08,'sine',0.1);
  }

  const shieldActive = keys['KeyS'] && !shieldBroken;

  // Shoot
  if(keys['KeyW']&&hero.shootTimer<=0){
    const shots = weaponLevel + 1; // 1, 2 or 3
    const offsets = shots===1?[0]:shots===2?[-4,4]:[-7,0,7];
    for(const vy of offsets){
      pProjectiles.push({
        x:hero.x+(hero.facing>0?hero.w+2:-10), y:hero.y+hero.h*0.35,
        vx:hero.facing*9, vy, life:70, r:6
      });
    }
    hero.shootTimer=12;
    playFX(660,0.07,'sine',0.12);
  }
  if(hero.shootTimer>0) hero.shootTimer--;

  // Board rocket
  if(justDown['KeyA']){
    const d=Math.hypot(hero.x-srkt.x, hero.y-srkt.y);
    if(d<80){ inRocket=true; return; }
  }

  // === EARTH SPECIALS – uses keys[] (held state) + cooldown for reliability ===
  if(currentPlanet==='earth' && !inRocket){
    if(interactCooldown>0) interactCooldown--;

    const CHEST_X=1490, KIOSK_X=1320, HOUSE_X=1130;
    const nearChest = Math.abs(hero.x-CHEST_X)<65;
    const nearKiosk = Math.abs(hero.x-KIOSK_X)<65;
    const nearHouse = Math.abs(hero.x-HOUSE_X)<65;

    // Close kiosk when walking away
    if(!nearKiosk && !mathQuiz) kioskOpen=false;

    if(interactCooldown===0 && !mathQuiz && !dialog){
      // SCHATZTRUHE: E, O, or F
      if(nearChest && (keys['KeyE']||keys['KeyO']||keys['KeyF']) && !kioskOpen){
        startMathQuiz();
        interactCooldown=30;
      }
      // KIOSK: K toggles
      else if(nearKiosk && keys['KeyK']){
        kioskOpen=!kioskOpen;
        interactCooldown=30;
      }
      // KRANKENHAUS: H
      else if(nearHouse && keys['KeyH'] && !kioskOpen){
        if(lives>=3){
          dialog={msg:'Du hast bereits 3 Herzen!',yLabel:'OK',nLabel:null,onY:()=>{dialog=null;},onN:null};
        } else if(crowns<20){
          dialog={msg:'Zu wenig Kronen! (brauche 20)',yLabel:'OK',nLabel:null,onY:()=>{dialog=null;},onN:null};
        } else {
          dialog={
            msg:'Ein Herz kaufen? (kostet 20 Kronen)',
            yLabel:'J – Ja',nLabel:'N – Nein',
            onY:()=>{crowns-=20;lives=Math.min(lives+1,3);dialog=null;playFX(660,0.3,'sine',0.2);},
            onN:()=>{dialog=null;}
          };
        }
        interactCooldown=30;
      }
    }

    // Kiosk tab switching and buying (while open)
    if(kioskOpen && nearKiosk && interactCooldown===0){
      if(keys['Digit1']||keys['Numpad1']){ kioskTab='weapon'; interactCooldown=20; }
      if(keys['Digit2']||keys['Numpad2']){ kioskTab='shield'; interactCooldown=20; }
      if(keys['Digit3']||keys['Numpad3']){ kioskTab='rocket'; interactCooldown=20; }
      if(keys['Escape']){ kioskOpen=false; interactCooldown=20; }
      if(keys['Enter']){
        const lvl=kioskTab==='weapon'?weaponLevel:kioskTab==='shield'?shieldLevel:rocketLevel;
        if(lvl<2 && crowns>=100){
          crowns-=100;
          if(kioskTab==='weapon') weaponLevel++;
          else if(kioskTab==='shield') shieldLevel++;
          else rocketLevel++;
          playFX(880,0.3,'sine',0.25);
        }
        interactCooldown=30;
      }
    }
  }

  // Physics
  hero.vy+=pd.gravity;
  hero.x+=hero.vx; hero.y+=hero.vy;
  if(hero.x<0) hero.x=0;
  if(hero.x+hero.w>WORLD_W) hero.x=WORLD_W-hero.w;

  // Ground
  hero.onGround=false;
  if(hero.y+hero.h>=gy){ hero.y=gy-hero.h; hero.vy=0; hero.onGround=true; }
  for(const pl of platforms){
    if(overlap(hero.x,hero.y,hero.w,hero.h,pl.x,pl.y,pl.w,pl.h)){
      const prev=hero.y+hero.h-hero.vy;
      if(prev<=pl.y+4&&hero.vy>=0){ hero.y=pl.y-hero.h; hero.vy=0; hero.onGround=true; }
    }
  }

  // Magma holes death
  if(currentPlanet==='magma'){
    for(const h of magmaHoles){
      if(overlap(hero.x,hero.y+hero.h-4,hero.w,4,h.x,h.y,h.w,h.h)&&hero.vy>=0){
        takeDamage(); break;
      }
    }
  }

  // Lucky tree recharge
  const treeNear = Math.hypot(hero.x - luckyTree.x, hero.y - (gy - 60)) < 70;
  if (treeNear) {
    // Recharge regardless of broken state (topped up continuously while touching)
    if (shieldHP < 100 || shieldBroken) {
      treeRechargeTimer++;
      const prog = treeRechargeTimer / TREE_RECHARGE_TIME;
      shieldHP = Math.min(100, Math.floor(prog * 100));
      if (treeRechargeTimer >= TREE_RECHARGE_TIME) {
        shieldHP = 100; shieldBroken = false; shieldBlocked = 0;
        treeRechargeTimer = 0;
        for (let i = 0; i < 12; i++) hitFX.push({
          x: luckyTree.x + Math.random()*30-15, y: gy-60+Math.random()*40-20,
          vx: (Math.random()-.5)*4, vy: -Math.random()*3-1, life:30, color:'#afa'
        });
        playFX(880, 0.3, 'sine', 0.2);
      }
    }
  } else {
    treeRechargeTimer = 0;
  }

  // ── Question block collisions (hit from below) ──────────────────
  for(const b of questionBlocks){
    if(b.bounceTimer>0){ b.bounceTimer--; b.bounceY = Math.sin(b.bounceTimer/8*Math.PI)*10; }
    else b.bounceY=0;
    b.shimmer+=0.06;
    if(!b.used){
      // Hero head hits bottom of block while jumping up
      const heroTop  = hero.y;
      const heroBot  = hero.y + hero.h;
      const blockBot = b.y + b.h;
      const heroMidX = hero.x + hero.w/2;
      if(hero.vy<0 &&
         heroTop > b.y - 4 && heroTop < blockBot + 4 &&
         heroMidX > b.x && heroMidX < b.x+b.w){
        // Bump!
        b.used = true;
        b.bounceTimer = 14;
        hero.vy = Math.abs(hero.vy) * 0.4;  // gentle bounce back down
        playFX(440, 0.15, 'square', 0.2);
        // Spawn coins flying up
        for(let i=0;i<b.coins;i++){
          coinPickups.push({
            x: b.x + b.w/2 + (Math.random()-0.5)*20,
            y: b.y - 10,
            vx: (Math.random()-0.5)*2.5,
            vy: -(4 + Math.random()*3),
            collected: false,
            life: 160,
            bounce: 0
          });
        }
        // Spawn crown FX at block
        crownFX.push({x:b.x+b.w/2, y:b.y-10, life:60});
      }
    }
  }

  // ── Coin pickup collection ────────────────────────────────────────
  for(const coin of coinPickups){
    if(coin.collected) continue;
    coin.vy += PLANET_DATA[currentPlanet].gravity * 0.7;
    coin.x  += coin.vx;
    coin.y  += coin.vy;
    coin.life--;
    // Bounce off ground
    const gy2 = groundY();
    if(coin.y >= gy2 - 14){
      coin.y   = gy2 - 14;
      coin.vy  = -Math.abs(coin.vy) * 0.35;
      coin.vx *= 0.8;
      coin.bounce++;
      if(coin.bounce > 3) coin.vy = 0;
    }
    // Hero collects coin
    if(Math.hypot(hero.x+hero.w/2 - coin.x, hero.y+hero.h/2 - coin.y) < 28){
      coin.collected = true;
      crowns++;
      playFX(880, 0.06, 'sine', 0.15);
      crownFX.push({x:coin.x, y:coin.y, life:50});
    }
  }
  coinPickups = coinPickups.filter(c=>!c.collected && c.life>0);

  camX=Math.max(0,Math.min(WORLD_W-W, hero.x+hero.w/2-W/2));
  if(hero.invTimer>0) hero.invTimer--;

  // Castle entry check (magma planet)
  if(currentPlanet==='magma' && !castleEntered){
    const inCastle = (hero.x>CASTLE_X && hero.x<CASTLE_X+CASTLE_W);
    // Right entrance (staircase approach, no bridge needed)
    // Right entrance: approach from outside-right, at the height the staircase reaches
    const rightEntrance = hero.x > CASTLE_X+CASTLE_W+30 && hero.y < gy-140 && hero.y > gy-260;
    // Left entrance (only if drawbridge down)
    const leftEntrance  = hero.x > CASTLE_X-20 && hero.x < CASTLE_X+30 && drawbridgeDown;
    if(rightEntrance || leftEntrance){
      castleEntered=true;
      startBossFight();
      return;
    }
  }

  // Player projectiles
  pProjectiles=pProjectiles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0&&p.x>0&&p.x<WORLD_W; });

  // Regular monsters
  updateMonsters(gy, shieldActive);

  // Magma monsters
  updateMagmaMonsters(gy);

  // Monster projectiles vs hero
  mProjectiles=mProjectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0||p.y>gy) return false;
    if(hero.invTimer<=0){
      if(shieldActive){
        const blocked = shieldLevel>=2
          ? circRect(p.x,p.y,p.r, hero.x-10,hero.y-10, hero.w+20,hero.h+20)
          : shieldLevel>=1
            ? circRect(p.x,p.y,p.r,hero.x-14,hero.y-8,hero.w+28,hero.h+16)
            : circRect(p.x,p.y,p.r,(hero.facing>0?hero.x+hero.w:hero.x-16)-4,hero.y-8,14,hero.h+16);
        if(blocked){
          shieldBlocked++;
          if(shieldBlocked>=100){ shieldBroken=true; shieldHP=0; }
          else shieldHP=100-shieldBlocked;
          for(let j=0;j<4;j++) hitFX.push({x:p.x,y:p.y,vx:(Math.random()-.5)*4,vy:-(Math.random()*2),life:15,color:'#4df'});
          return false;
        }
      }
      if(circRect(p.x,p.y,p.r,hero.x,hero.y,hero.w,hero.h)){
        takeDamage(); return false;
      }
    }
    return true;
  });

  // Level complete on monster planet
  if(currentPlanet==='monster'&&monsters.length===0){
    level++; if(level>100) gs=S.GAMEOVER; else enterSpace(currentPlanet);
  }
}

function takeDamage(){
  lives--; hero.invTimer=130;
  for(let j=0;j<8;j++) hitFX.push({x:hero.x+hero.w/2,y:hero.y+hero.h/2,vx:(Math.random()-.5)*6,vy:-(Math.random()*4+1),life:28,color:'#f44'});
  playFX(110,0.3,'sawtooth',0.3);
  if(lives<=0){ gs=S.GAMEOVER; setTimeout(()=>showNameInput(),400); }
}

function updateMonsters(gy, shieldActive){
  for(const m of monsters){
    if(m.dead){ m.deadTimer++; continue; }
    m.x+=m.vx;
    if(m.x<40||m.x+m.w>WORLD_W-40) m.vx*=-1;
    m.vy+=PLANET_DATA[currentPlanet].gravity;
    m.y+=m.vy;
    if(m.y+m.h>=gy){ m.y=gy-m.h; m.vy=0; }
    m.shootTimer--;
    if(m.shootTimer<=0){
      m.shootTimer=Math.max(180-level*1.5,60);
      const mx=m.x+m.w/2,my=m.y+m.h/2;
      const hx=hero.x+hero.w/2,hy=hero.y+hero.h/2;
      const d=Math.hypot(hx-mx,hy-my)||1;
      const spd=3.5+level*0.03;
      mProjectiles.push({x:mx,y:my,vx:(hx-mx)/d*spd,vy:(hy-my)/d*spd,life:130,r:5});
    }
    // Hit by water
    for(let i=pProjectiles.length-1;i>=0;i--){
      const p=pProjectiles[i];
      if(circRect(p.x,p.y,p.r,m.x,m.y,m.w,m.h)){
        pProjectiles.splice(i,1); m.hits++;
        for(let j=0;j<5;j++) hitFX.push({x:p.x,y:p.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:18,color:'#4af'});
        if(m.hits>=m.maxHp){
          m.dead=true;
          const reward = m.isMiniBoss ? m.crownReward : 1;
          crowns += reward;
          crownFX.push({x:m.x+m.w/2,y:m.y,life:100});
          for(let j=0;j<(m.isMiniBoss?16:8);j++) hitFX.push({x:m.x+m.w/2,y:m.y+m.h/2,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:m.isMiniBoss?45:30,color:m.isMiniBoss?'#ffd700':'#88f'});
          if(m.isMiniBoss){ for(let k=0;k<3;k++) crownFX.push({x:m.x+m.w/2+(k-1)*30,y:m.y-k*20,life:120}); }
          playFX(m.isMiniBoss?880:330, m.isMiniBoss?0.4:0.15, 'square', m.isMiniBoss?0.3:0.15);
        }
      }
    }
  }
  monsters=monsters.filter(m=>!(m.dead&&m.deadTimer>40));
}

function updateMagmaMonsters(gy){
  const targetX = CASTLE_X - 10;
  const spd = kidsMode ? 0.5 : 1.0;
  for(const m of magmaMonsters){
    if(m.dead){ m.deadTimer++; continue; }
    // Rage increases as monster takes damage (0-1 scale)
    m.rage = 1 - (m.hp / m.maxHp);
    const rageMult = 1 + m.rage * 2.5;  // up to 3.5x speed at low HP
    // Move toward castle
    if(m.x < targetX) m.vx =  Math.abs(m.vx);
    else              m.vx = -Math.abs(m.vx);
    m.x += m.vx * spd * rageMult;
    m.vy += PLANET_DATA.magma.gravity;
    m.y  += m.vy;
    if(m.y+m.h >= gy){ m.y=gy-m.h; m.vy=0; }

    // Shoot at hero (range 500px)
    if(m.shootTimer === undefined) m.shootTimer = 80;
    m.shootTimer--;
    const dist = Math.hypot(hero.x - m.x, hero.y - m.y);
    const shootCooldown = Math.max(30, kidsMode ? 180 : Math.floor(90 - m.rage * 60));
    if(m.shootTimer <= 0 && dist < 600 && !inRocket){
      m.shootTimer = shootCooldown;
      const dx = hero.x+hero.w/2 - (m.x+m.w/2);
      const dy = hero.y+hero.h/2 - (m.y+m.h/2);
      const d  = Math.hypot(dx,dy)||1;
      const ps = kidsMode ? 2 : 3.5;
      mProjectiles.push({ x:m.x+m.w/2, y:m.y+m.h/2, vx:dx/d*ps, vy:dy/d*ps, life:100, r:5 });
    }

    // Hit by water
    for(let i=pProjectiles.length-1;i>=0;i--){
      const p=pProjectiles[i];
      if(circRect(p.x,p.y,p.r,m.x,m.y,m.w,m.h)){
        pProjectiles.splice(i,1);
        m.hp--;
        for(let j=0;j<4;j++) hitFX.push({x:p.x,y:p.y,vx:(Math.random()-.5)*5,vy:-Math.random()*3,life:16,color:'#f84'});
        if(m.hp<=0){
          m.dead=true; m.deadTimer=0;
          crowns+=3; crownFX.push({x:m.x+m.w/2,y:m.y,life:80});
          for(let j=0;j<10;j++) hitFX.push({x:m.x+m.w/2,y:m.y+m.h/2,vx:(Math.random()-.5)*8,vy:-Math.random()*5-1,life:30,color:'#f84'});
          playFX(440,0.2,'square',0.2);
        } else {
          playFX(330,0.05,'square',0.1);
        }
      }
    }
  }
  magmaMonsters = magmaMonsters.filter(m=>!(m.dead&&m.deadTimer>35));
  drawbridgeDown = magmaMonsters.some(m=>!m.dead && Math.abs(m.x-CASTLE_X)<180);
}

// ─── BOSS FIGHT ──────────────────────────────────────────────────
function updateBoss(){
  const floorY = H-80;

  // Boss movement (bounces)
  boss.x+=boss.vx; boss.y+=boss.vy;
  boss.vy+=0.08;
  if(boss.y+boss.h>=floorY){ boss.y=floorY-boss.h; boss.vy=-Math.abs(boss.vy)*0.7; }
  if(boss.y<60){ boss.y=60; boss.vy=Math.abs(boss.vy); }
  if(boss.x<60){ boss.x=60; boss.vx=Math.abs(boss.vx); }
  if(boss.x+boss.w>W-60){ boss.x=W-60-boss.w; boss.vx=-Math.abs(boss.vx); }

  // Phase escalation
  boss.phase = boss.hits >= 20 ? 2 : boss.hits >= 10 ? 1 : 0;

  // Boss shoots
  boss.shootTimer--;
  if(boss.shootTimer<=0){
    boss.shootTimer = Math.max(45, 90 - boss.phase*20);
    const mx=boss.x+boss.w/2, my=boss.y+boss.h/2;
    const hx=hero.x+hero.w/2, hy=hero.y+hero.h/2;
    const d=Math.hypot(hx-mx,hy-my)||1;
    // 10 shots in a spread
    for(let i=0;i<10;i++){
      const spread=(i-4.5)*(0.18+boss.phase*0.08);
      const angle=Math.atan2(hy-my,hx-mx)+spread;
      const spd=4+boss.phase*1.5;
      bossProjectiles.push({x:mx,y:my,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:140,r:7});
    }
    playFX(100,0.25,'sawtooth',0.3);
  }

  // Hero movement (simplified 2D boss room)
  hero.vx=0;
  if(keys['ArrowLeft'])  { hero.vx=-3.5; hero.facing=-1; }
  if(keys['ArrowRight']) { hero.vx= 3.5; hero.facing= 1; }
  if(justDown['Space']&&hero.onGround){ hero.vy=-9; }
  if(keys['KeyW']&&hero.shootTimer<=0){
    pProjectiles.push({x:hero.x+(hero.facing>0?hero.w+2:-10),y:hero.y+hero.h*0.35,vx:hero.facing*10,vy:0,life:80,r:7});
    hero.shootTimer=12;
    playFX(660,0.06,'sine',0.1);
  }
  if(hero.shootTimer>0) hero.shootTimer--;
  const shieldActive=keys['KeyS']&&!shieldBroken;
  hero.vy+=0.5; hero.x+=hero.vx; hero.y+=hero.vy;
  if(hero.x<10) hero.x=10;
  if(hero.x+hero.w>W-10) hero.x=W-10-hero.w;
  hero.onGround=false;
  if(hero.y+hero.h>=floorY){ hero.y=floorY-hero.h; hero.vy=0; hero.onGround=true; }
  if(hero.invTimer>0) hero.invTimer--;

  // Player water vs boss
  pProjectiles=pProjectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0) return false;
    if(!boss.dead&&circRect(p.x,p.y,p.r,boss.x,boss.y,boss.w,boss.h)){
      boss.hits++;
      boss.hp=boss.maxHp-boss.hits;
      for(let j=0;j<5;j++) hitFX.push({x:p.x,y:p.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:18,color:'#4af'});
      playFX(440+boss.hits*8,0.1,'sine',0.15);
      if(boss.hits>=boss.maxHp && !boss.dead){
        boss.dead=true; boss.deadTimer=0;
        crowns+=30;
        triggerBossExplosion();
      }
      return false;
    }
    return true;
  });

  // Boss projectiles vs hero
  bossProjectiles=bossProjectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0||p.x<0||p.x>W||p.y>H) return false;
    if(hero.invTimer<=0){
      if(shieldActive){
        const fx=hero.facing>0?hero.x+hero.w:hero.x-12;
        if(circRect(p.x,p.y,p.r,fx-4,hero.y-8,10,hero.h+16)){
          shieldBlocked++;
          if(shieldBlocked>=100) shieldBroken=true;
          else shieldHP=100-shieldBlocked;
          for(let j=0;j<4;j++) hitFX.push({x:p.x,y:p.y,vx:(Math.random()-.5)*4,vy:-2,life:14,color:'#4df'});
          return false;
        }
      }
      if(circRect(p.x,p.y,p.r,hero.x,hero.y,hero.w,hero.h)){
        lives--; hero.invTimer=140;
        for(let j=0;j<8;j++) hitFX.push({x:hero.x+hero.w/2,y:hero.y+hero.h/2,vx:(Math.random()-.5)*6,vy:-3,life:25,color:'#f44'});
        playFX(110,0.25,'sawtooth',0.3);
        if(lives<=0){ gs=S.GAMEOVER; setTimeout(()=>showNameInput(),500); }
        return false;
      }
    }
    return true;
  });

  if(boss.dead){
    boss.deadTimer++;
    if(boss.deadTimer===80) gs=S.BOSSWIN;
  }
}

function triggerBossExplosion(){
  playExplosion();
  for(let i=0;i<60;i++){
    explosionFX.push({
      x:boss.x+boss.w/2+Math.random()*120-60,
      y:boss.y+boss.h/2+Math.random()*80-40,
      vx:(Math.random()-.5)*10, vy:(Math.random()-.5)*8,
      r:8+Math.random()*18, life:50+Math.random()*30,
      color:`hsl(${20+Math.random()*60},100%,${50+Math.random()*30}%)`
    });
  }
  bossWinTimer=0;
  bossWinMsg='Du hast es geschafft!\nDer Monsterboss ist besiegt!';
  bossDefeated = true;
}

function updateBossWin(){
  bossWinTimer++;
  if(bossWinTimer>300){
    // Fly back to earth
    enterSpace('magma');
  }
}

function updateBoard(){
  if(justDown['Space']||justDown['Enter']||justDown['KeyA']){ goToMenu(); }
}

// ═══════════════════════════════════════════════════════════════════
function render(){
  frame++;
  ctx.clearRect(0,0,W,H);
  switch(gs){
    case S.MENU:        renderMenu();        break;
    case S.LAUNCH:      renderLaunch();      break;
    case S.SPACE:       renderSpace();       break;
    case S.APPROACHING: renderApproaching(); break;
    case S.SURFACE:     renderSurface();     break;
    case S.BOSS:        renderBoss();        break;
    case S.BOSSWIN:     renderBossWin();     break;
    case S.GAMEOVER:    renderGameOver();    break;
    case S.BOARD:       renderBoard();       break;
  }
}

// ─── STARS ───────────────────────────────────────────────────────
function drawStars(a=1){
  ctx.save();
  for(const s of STARS){
    const tw=0.5+0.5*Math.sin(frame*0.02+s.b*100);
    ctx.globalAlpha=a*(0.3+s.b*0.7)*tw;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ─── ROCKET (launch & surface) ───────────────────────────────────
function drawRocket(x,y,angle,thrust,small=false){
  const sc=small?0.55:1;
  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle); ctx.scale(sc,sc);
  if(thrust){
    const fh=14+Math.sin(frame*0.3)*8+(rkt.power||6)*1.2;
    const fg=ctx.createLinearGradient(0,12,0,12+fh);
    fg.addColorStop(0,'rgba(255,255,200,1)'); fg.addColorStop(0.3,'rgba(255,160,0,0.9)'); fg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.moveTo(-7,12); ctx.lineTo(7,12); ctx.lineTo(0,12+fh); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle=COLORS.rocket;
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(11,12); ctx.lineTo(-11,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#c00'; ctx.fillRect(-11,2,22,5);
  ctx.fillStyle=COLORS.nose;
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(6,-4); ctx.lineTo(-6,-4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#4af'; ctx.strokeStyle='#89c'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,2,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#8899bb';
  ctx.beginPath(); ctx.moveTo(11,12); ctx.lineTo(20,22); ctx.lineTo(11,18); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-11,12); ctx.lineTo(-20,22); ctx.lineTo(-11,18); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── SPACE ROCKET ────────────────────────────────────────────────
function drawSpaceRocket(x,y,angle,thrusting){
  if(thrusting){ const tx=x-Math.sin(angle)*18, ty=y+Math.cos(angle)*18; shipTrail.push({x:tx,y:ty,life:22,r:3+Math.random()*3}); }
  if(frame%3===0){ const tx=x-Math.sin(angle)*14, ty=y+Math.cos(angle)*14; shipTrail.push({x:tx,y:ty,life:10,r:1.5}); }
  shipTrail=shipTrail.filter(p=>{
    p.life--;
    const a=p.life/22;
    ctx.globalAlpha=a*0.6;
    ctx.fillStyle=thrusting?`rgba(255,${Math.floor(120+a*100)},0,1)`:'rgba(100,160,255,0.5)';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2); ctx.fill();
    return p.life>0;
  });
  ctx.globalAlpha=1;
  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle);
  const halo=ctx.createRadialGradient(0,0,0,0,0,22);
  halo.addColorStop(0,'rgba(80,180,255,0.15)'); halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();
  if(thrusting){
    const fh=12+Math.sin(frame*0.4)*6;
    const fg=ctx.createLinearGradient(0,8,0,8+fh);
    fg.addColorStop(0,'rgba(255,255,200,1)'); fg.addColorStop(0.4,'rgba(255,160,0,0.9)'); fg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(-5,8); ctx.lineTo(5,8); ctx.lineTo(0,8+fh); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle=COLORS.rocket;
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(8,8); ctx.lineTo(-8,8); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#c00'; ctx.fillRect(-8,2,16,4);
  ctx.fillStyle=COLORS.nose;
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(4,-4); ctx.lineTo(-4,-4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#4af'; ctx.shadowColor='#4af'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(0,1,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#8899bb';
  ctx.beginPath(); ctx.moveTo(8,8); ctx.lineTo(14,16); ctx.lineTo(8,13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-8,8); ctx.lineTo(-14,16); ctx.lineTo(-8,13); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── HERO ────────────────────────────────────────────────────────
function drawHero2(wx,wy){
  const blink=hero.invTimer>0&&Math.floor(frame/5)%2===0;
  if(blink) return;
  const f=hero.facing, cx=wx+hero.w/2;
  const shieldActive=keys['KeyS']&&!shieldBroken;
  const leg=hero.onGround&&(keys['ArrowLeft']||keys['ArrowRight'])?Math.sin(frame*0.25)*4:0;
  ctx.fillStyle='#1a3d6e';
  ctx.fillRect(cx-4+(f>0?leg:-leg),wy+20,6,10); ctx.fillRect(cx+1+(f>0?-leg:leg),wy+20,6,10);
  ctx.fillStyle='#111';
  ctx.fillRect(cx-4+(f>0?leg:-leg),wy+29,7,4); ctx.fillRect(cx+1+(f>0?-leg:leg),wy+29,7,4);
  ctx.fillStyle=COLORS.hero;
  ctx.beginPath(); ctx.roundRect(cx-7,wy+8,14,14,3); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(cx-2,wy+10,4,8);
  ctx.fillStyle=COLORS.hero;
  ctx.fillRect(f>0?cx+7:cx-12,wy+10,5,9); ctx.fillRect(f>0?cx-12:cx+7,wy+11,5,8);
  ctx.fillStyle='#ffd0b0'; ctx.beginPath(); ctx.arc(cx,wy+3,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a5fa0'; ctx.beginPath(); ctx.arc(cx,wy+2,7,Math.PI,0); ctx.fill();
  ctx.fillStyle='rgba(100,200,255,0.6)'; ctx.beginPath(); ctx.arc(cx,wy+4,5,Math.PI,0); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(cx-2,wy+1,2,0,Math.PI*2); ctx.fill();
  if(shieldActive){
    ctx.strokeStyle='rgba(80,200,255,0.85)'; ctx.lineWidth=4;
    ctx.shadowColor='#4af'; ctx.shadowBlur=8;
    if(shieldLevel>=2){
      // Full circle around hero
      ctx.beginPath(); ctx.arc(cx,wy+12,22,0,Math.PI*2); ctx.stroke();
    } else if(shieldLevel>=1){
      // Both sides
      ctx.beginPath(); ctx.arc(cx+14,wy+12,18,-Math.PI*0.6,Math.PI*0.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx-14,wy+12,18,Math.PI*0.4,Math.PI*1.6); ctx.stroke();
    } else {
      // Front only
      const shx=f>0?cx+14:cx-14;
      ctx.beginPath(); ctx.arc(shx,wy+12,18,-Math.PI*0.6,Math.PI*0.6,f<0); ctx.stroke();
    }
    ctx.shadowBlur=0;
  }
  if(shieldBroken&&keys['KeyS']){
    ctx.fillStyle='rgba(255,80,80,0.7)'; ctx.font='12px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠ Schild kaputt!',cx,wy-10);
  }
}

// ─── MONSTER ─────────────────────────────────────────────────────
function drawMiniBoss(m){
  ctx.save();
  ctx.translate(m.x + m.w/2, m.y);
  if(m.dead) ctx.globalAlpha = 1-m.deadTimer/40;
  const pulse = Math.sin(frame*0.07)*4;
  const hp_pct = (m.maxHp - m.hits) / m.maxHp;

  // Glow aura
  const aura = ctx.createRadialGradient(0,m.h/2,0,0,m.h/2,m.w*0.9);
  aura.addColorStop(0,`rgba(255,200,0,${0.15+pulse*0.01})`);
  aura.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,m.h/2,m.w*0.9,0,Math.PI*2); ctx.fill();

  // Body – dark purple
  ctx.fillStyle='#3a0060';
  ctx.beginPath(); ctx.roundRect(-m.w/2,0,m.w,m.h,10); ctx.fill();

  // Armor trim
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(-m.w/2,0,m.w,m.h,10); ctx.stroke();

  // Horns
  ctx.fillStyle='#ff4400';
  ctx.beginPath(); ctx.moveTo(-m.w*0.3,-4); ctx.lineTo(-m.w*0.2,-18-pulse); ctx.lineTo(-m.w*0.1,-4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( m.w*0.1,-4); ctx.lineTo( m.w*0.2,-18-pulse); ctx.lineTo( m.w*0.3,-4); ctx.closePath(); ctx.fill();

  // Eyes
  const eyeG=ctx.createRadialGradient(0,m.h*0.28,0,0,m.h*0.28,10);
  eyeG.addColorStop(0,'#ff0'); eyeG.addColorStop(1,'#f80');
  ctx.fillStyle=eyeG;
  ctx.beginPath(); ctx.arc(-m.w*0.22,m.h*0.28,9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( m.w*0.22,m.h*0.28,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-m.w*0.22,m.h*0.28,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( m.w*0.22,m.h*0.28,4,0,Math.PI*2); ctx.fill();

  // Crown on head
  ctx.fillStyle='#ffd700';
  const cr=m.w*0.13;
  ctx.beginPath();
  ctx.moveTo(-m.w*0.3,-6); ctx.lineTo(-m.w*0.3,-22); ctx.lineTo(-m.w*0.15,-14);
  ctx.lineTo(0,-24-pulse*0.5); ctx.lineTo(m.w*0.15,-14);
  ctx.lineTo(m.w*0.3,-22); ctx.lineTo(m.w*0.3,-6); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f00'; ctx.beginPath(); ctx.arc(0,-23,4,0,Math.PI*2); ctx.fill();

  // HP bar
  ctx.fillStyle='#200'; ctx.fillRect(-m.w/2,-34,m.w,10);
  ctx.fillStyle=hp_pct>0.5?'#0f0':hp_pct>0.25?'#fa0':'#f00';
  ctx.fillRect(-m.w/2,-34,m.w*hp_pct,10);
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(-m.w/2,-34,m.w,10);

  // Tier label
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.floor(m.w*0.22)}px monospace`; ctx.textAlign='center';
  ctx.fillText(`⚔ Boss Tier ${m.tier}`,0,-38);

  ctx.globalAlpha=1; ctx.restore();
}

// ─── MAGMA MONSTER ───────────────────────────────────────────────
function drawMagmaMonster(m){
  ctx.save();
  ctx.translate(m.x+m.w/2, m.y);
  if(m.dead) ctx.globalAlpha=1-m.deadTimer/35;
  const rage = m.rage||0;
  const fl=Math.sin(frame*(0.15+rage*0.3))*3;
  const hp_pct = m.hp/m.maxHp;

  // Rage glow
  if(rage>0.3){
    const rg=ctx.createRadialGradient(0,m.h/2,0,0,m.h/2,m.w);
    rg.addColorStop(0,`rgba(255,60,0,${rage*0.4})`); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(0,m.h/2,m.w,0,Math.PI*2); ctx.fill();
  }

  // Body
  const bodyCol=rage>0.7?'#800000':rage>0.4?'#aa2200':COLORS.magmaMonster;
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.roundRect(-m.w/2,4,m.w,m.h-4,6); ctx.fill();

  // Lava cracks at high rage
  if(rage>0.5){
    ctx.strokeStyle=`rgba(255,200,0,${rage-0.4})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-8,8); ctx.lineTo(-3,18); ctx.lineTo(-8,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8,10); ctx.lineTo(4,20); ctx.lineTo(9,28); ctx.stroke();
  }

  // Spikes on top (grow with rage)
  ctx.fillStyle='#ff2200';
  const spikeH=6+rage*10;
  for(let i=-1;i<=1;i++){
    ctx.beginPath(); ctx.moveTo(i*10-5,4); ctx.lineTo(i*10,4-spikeH-fl); ctx.lineTo(i*10+5,4); ctx.closePath(); ctx.fill();
  }

  // Lava drips
  ctx.fillStyle=`rgb(255,${Math.floor(80+rage*80)},0)`;
  ctx.beginPath(); ctx.arc(-7,m.h*0.35,4+fl*0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,m.h*0.55,3,0,Math.PI*2); ctx.fill();

  // Eyes – glow brighter when enraged
  const eyeSize=4+rage*3;
  const eyeCol=rage>0.6?'#ff0000':'#ffff00';
  ctx.fillStyle=eyeCol;
  ctx.beginPath(); ctx.arc(-7,10,eyeSize,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,10,eyeSize,0,Math.PI*2); ctx.fill();
  if(rage>0.4){ // glow
    ctx.shadowColor=eyeCol; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(-7,10,eyeSize,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,10,eyeSize,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-7,10,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,10,2,0,Math.PI*2); ctx.fill();

  // Teeth
  ctx.fillStyle='#fff';
  for(let i=-2;i<=2;i++) ctx.fillRect(i*6-2,m.h-10,4,6);

  // HP bar
  ctx.fillStyle='#400'; ctx.fillRect(-m.w/2,-14,m.w,7);
  ctx.fillStyle=hp_pct>0.5?'#ff8800':hp_pct>0.25?'#ff4400':'#ff0000';
  ctx.fillRect(-m.w/2,-14,m.w*hp_pct,7);

  ctx.globalAlpha=1; ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,10,0.55)'; ctx.fillRect(0,0,W,52);

  // LEFT: crowns
  ctx.font='bold 20px Courier New'; ctx.fillStyle='#ffd700'; ctx.textAlign='left';
  ctx.fillText('👑 '+crowns, 12, 34);

  // CENTER: level + kids mode badge
  ctx.fillStyle='#adf'; ctx.font='bold 16px Courier New'; ctx.textAlign='center';
  ctx.fillText('LEVEL '+Math.min(level,100), W/2, 32);
  if(kidsMode){
    ctx.fillStyle='#afa'; ctx.font='bold 12px Courier New';
    ctx.fillText('🐣 KINDERMODUS', W/2, 48);
  }
  // Upgrade indicators
  if(weaponLevel>0||shieldLevel>0||rocketLevel>0){
    ctx.fillStyle='rgba(255,200,50,0.8)'; ctx.font='12px monospace'; ctx.textAlign='left';
    const ups=[];
    if(weaponLevel>0) ups.push('💧'.repeat(weaponLevel+1));
    if(shieldLevel>0) ups.push(shieldLevel===2?'🛡360°':shieldLevel===1?'🛡×2':'🛡');
    if(rocketLevel>0) ups.push('🚀'.repeat(rocketLevel+1));
    ctx.fillText(ups.join(' '), 12, 50);
  }

  // RIGHT: hearts – kept 170px from right edge so X+mute buttons don't overlap
  ctx.font='26px Arial'; ctx.textAlign='right';
  for(let i=0;i<3;i++) ctx.fillText(i<lives?'❤️':'🖤', W-170-i*36, 36);

  // Shield bar – bigger, below hearts
  const barW=160, barH=14, bx=W-170-2*36-barW-16, by=8;
  ctx.fillStyle='#111'; ctx.strokeStyle='#446'; ctx.lineWidth=1;
  ctx.fillRect(bx,by,barW,barH); ctx.strokeRect(bx,by,barW,barH);
  const barFill = barW*(shieldHP/100);
  const barCol = shieldBroken ? '#800' : shieldHP>60 ? '#4af' : shieldHP>30 ? '#fa0' : '#f44';
  ctx.fillStyle=barCol;
  ctx.fillRect(bx,by,barFill,barH);
  // Shield label
  ctx.fillStyle='#cdf'; ctx.font='bold 13px Courier New'; ctx.textAlign='right';
  ctx.fillText(shieldBroken ? '🛡 KAPUTT' : '🛡 '+shieldHP+'%', bx-6, by+barH-1);
  // Recharge hint
  if(treeRechargeTimer>0&&(shieldHP<100||shieldBroken)){
    const prog=treeRechargeTimer/TREE_RECHARGE_TIME;
    ctx.fillStyle='rgba(80,255,80,0.9)'; ctx.font='bold 12px Courier New'; ctx.textAlign='right';
    ctx.fillText('⚡ '+Math.ceil((TREE_RECHARGE_TIME-treeRechargeTimer)/60)+'s', bx-6, by+barH+14);
  }
}

// ─── FX ──────────────────────────────────────────────────────────
function drawFX(){
  ctx.font='28px Arial'; ctx.textAlign='center';
  for(const c of crownFX){ ctx.globalAlpha=c.life/80; ctx.fillText('👑',c.x,c.y); }

  for(const p of hitFX){
    ctx.globalAlpha=p.life/30; ctx.fillStyle=p.color;

    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ─── IN-GAME DIALOG BOX ──────────────────────────────────────────

    ctx.fillStyle='#fff'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';

}


// ─── MATH QUIZ OVERLAY ───────────────────────────────────────────
function generateMathQuestion() {
  const types = [
    () => { const a=Math.floor(Math.random()*50)+1, b=Math.floor(Math.random()*50)+1; return { q:`${a} + ${b} = ?`, ans:a+b }; },
    () => { const b=Math.floor(Math.random()*40)+1, a=b+Math.floor(Math.random()*40)+1; return { q:`${a} - ${b} = ?`, ans:a-b }; },
    () => { const a=Math.floor(Math.random()*25)+1; return { q:`Doppelt von ${a} = ?`, ans:a*2 }; },
    () => { const a=(Math.floor(Math.random()*25)+1)*2; return { q:`Haelfte von ${a} = ?`, ans:a/2 }; },
    () => { const t=[2,5,10][Math.floor(Math.random()*3)], a=Math.floor(Math.random()*10)+1; return { q:`${a} mal ${t} = ?`, ans:a*t }; },
    () => { const a=Math.floor(Math.random()*90)+1, b=a+Math.floor(Math.random()*(100-a))+1; return { q:`${a} + __ = ${b}`, ans:b-a }; },
    () => { const a=Math.floor(Math.random()*8)+2, b=Math.floor(Math.random()*a)+1; return { q:`${a} Aepfel, ${b} gegessen. Noch?`, ans:a-b }; },
    () => { const a=Math.floor(Math.random()*14)+5, b=Math.floor(Math.random()*a)+1; return { q:`${a} Kinder, ${b} gehen heim. Noch?`, ans:a-b }; }
  ];
  const p = types[Math.floor(Math.random()*types.length)]();
  return { question:p.q, answer:p.ans };
}
function startMathQuiz() {
  const q = generateMathQuestion();
  mathQuiz = { question:q.question, answer:q.answer, userInput:'', attempts:0, phase:'input' };
  playFX(660, 0.12, 'sine', 0.2);
}
function handleMathKey(code, key) {
  if (!mathQuiz) return;
  const q = mathQuiz;
  if (q.phase==='correct' || q.phase==='tryagain') {
    if (code==='KeyJ'||code==='Enter') startMathQuiz();
    else if (code==='KeyN'||code==='Escape') mathQuiz=null;
    return;
  }
  if (q.phase==='wrong1') {
    if (code==='Enter'||code==='KeyJ') { q.userInput=''; q.phase='input'; }
    else if (code==='Escape'||code==='KeyN') q.phase='tryagain';
    return;
  }
  if (key>='0'&&key<='9') { if(q.userInput.length<4) q.userInput+=key; }
  else if (code==='Backspace') q.userInput=q.userInput.slice(0,-1);
  else if (code==='Enter') {
    if (!q.userInput) return;
    if (parseInt(q.userInput,10)===q.answer) {
      crowns+=5; q.phase='correct';
      const CX=1490;
      for(let i=0;i<20;i++) hitFX.push({x:CX+Math.random()*60-30,y:groundY()-50+Math.random()*30,vx:(Math.random()-.5)*7,vy:-Math.random()*6-2,life:45,color:'#ffd700'});
      crownFX.push({x:CX,y:groundY()-70,life:120});
      playFX(880,0.4,'sine',0.3);
    } else {
      q.attempts++; q.userInput='';
      if(q.attempts>=2){ q.phase='tryagain'; playFX(110,0.3,'sawtooth',0.2); }
      else { q.phase='wrong1'; playFX(220,0.2,'sawtooth',0.15); }
    }
  }
}

function drawQuestionBlocks(){
  for(const b of questionBlocks){
    const bx = b.x, by = b.y - b.bounceY;
    const BW = b.w, BH = b.h;

    if(b.used){
      // Grey empty block
      ctx.fillStyle='#888';
      ctx.fillRect(bx,by,BW,BH);
      ctx.strokeStyle='#555'; ctx.lineWidth=2;
      ctx.strokeRect(bx,by,BW,BH);
      ctx.fillStyle='#666';
      ctx.fillRect(bx+3,by+3,BW-6,BH-6);
    } else {
      // Animated ? block
      const glow = 0.55 + Math.sin(b.shimmer)*0.45;
      // Shadow
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(bx+3,by+3,BW,BH);
      // Main block
      const bg=ctx.createLinearGradient(bx,by,bx,by+BH);
      bg.addColorStop(0,'#ffdb4d'); bg.addColorStop(0.5,'#ffaa00'); bg.addColorStop(1,'#cc7700');
      ctx.fillStyle=bg;
      ctx.fillRect(bx,by,BW,BH);
      // Border
      ctx.strokeStyle='#5a3000'; ctx.lineWidth=2;
      ctx.strokeRect(bx,by,BW,BH);
      // Inner bevel
      ctx.strokeStyle='rgba(255,255,200,0.6)'; ctx.lineWidth=1.5;
      ctx.strokeRect(bx+3,by+3,BW-6,BH-6);
      // ? symbol (animated)
      ctx.fillStyle=`rgba(80,30,0,${0.7+glow*0.3})`;
      ctx.font=`bold ${Math.floor(BH*0.65)}px Arial`;
      ctx.textAlign='center';
      ctx.fillText('?',bx+BW/2,by+BH*0.72);
      // Shimmer sparkle
      if(Math.sin(b.shimmer*2)>0.7){
        ctx.fillStyle='rgba(255,255,220,0.8)';
        ctx.beginPath(); ctx.arc(bx+BW*0.75,by+BH*0.28,3,0,Math.PI*2); ctx.fill();
      }
    }
  }
}

  ctx.fillStyle=gg; ctx.fillRect(0,groundY()-10,W,H-groundY()+10);
  ctx.fillStyle='#5ab532';
  for(let i=0;i<W;i+=18) ctx.fillRect(i,groundY()-18,8,12);
  drawRocket(rkt.x,rkt.y,rkt.angle,rkt.thrusting);
  drawHUD();
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='15px Courier New';
  ctx.fillText('↑ Schub halten zum Abheben  |  ← → Lenken',W/2,H-12);
}

// ─── SPACE ───────────────────────────────────────────────────────
function renderSpace(){
  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  drawStars();
  // Nebula
  for(let i=0;i<3;i++){
    const nx=(0.15+i*0.35)*W, ny=(0.3+i*0.2)*H;
    const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,120);
    ng.addColorStop(0,['rgba(100,50,200,0.06)','rgba(50,100,200,0.06)','rgba(200,50,100,0.05)'][i]);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
  }
  // Planets
  for(const sp of SPACE_PLANETS){
    const px=sp.rx*W, py=sp.ry*H;
    const pd=PLANET_DATA[sp.id];
    const glow=ctx.createRadialGradient(px,py,sp.r*0.3,px,py,sp.r*2.4);
    glow.addColorStop(0,hexToRgba(pd.color,0.35)); glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(px,py,sp.r*2.4,0,Math.PI*2); ctx.fill();
    const pg=ctx.createRadialGradient(px-sp.r*0.35,py-sp.r*0.35,0,px,py,sp.r);
    pg.addColorStop(0,pd.accent); pg.addColorStop(1,pd.color);
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(px,py,sp.r,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.arc(px,py,sp.r,0,Math.PI*2); ctx.clip();
    ctx.globalAlpha=0.18; ctx.fillStyle='#ffffff'; ctx.fillRect(px-sp.r,py-9,sp.r*2,18);
    ctx.restore(); ctx.globalAlpha=1;
    if(sp.id==='moon'){
      ctx.strokeStyle='rgba(200,200,200,0.4)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.ellipse(px,py,sp.r+18,9,0.3,0,Math.PI*2); ctx.stroke();
    }
    if(sp.id==='monster'){
      ctx.save(); ctx.beginPath(); ctx.arc(px,py,sp.r,0,Math.PI*2); ctx.clip();
      ctx.globalAlpha=0.25; ctx.fillStyle='#ff2200';
      ctx.fillRect(px-sp.r,py+sp.r*0.15,sp.r*2,sp.r*0.45);
      ctx.restore(); ctx.globalAlpha=1;
    }
    if(sp.id==='magma'){
      ctx.save(); ctx.beginPath(); ctx.arc(px,py,sp.r,0,Math.PI*2); ctx.clip();
      ctx.globalAlpha=0.3; ctx.fillStyle='#ff6600';
      for(let i=0;i<4;i++) ctx.fillRect(px-sp.r+i*sp.r*0.5,py+sp.r*0.3,sp.r*0.3,sp.r*0.5);
      ctx.restore(); ctx.globalAlpha=1;
    }
    if(approachCooldown<=0){
      const d=Math.hypot(ship.x-px,ship.y-py);
      if(d<sp.r+140){
        const t2=Math.max(0,1-(d-sp.r)/140);
        ctx.strokeStyle=`rgba(255,255,80,${t2*0.85})`; ctx.lineWidth=2.5;
        ctx.setLineDash([7,5]);
        ctx.beginPath(); ctx.arc(px,py,sp.r+14+Math.sin(frame*0.1)*5,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=`rgba(255,255,150,${t2})`; ctx.font='bold 14px Courier New'; ctx.textAlign='center';
        ctx.fillText('▼ Landung...',px,py-sp.r-26);
      }
    }
    ctx.save(); ctx.shadowColor=pd.color; ctx.shadowBlur=10;
    ctx.fillStyle='#ddeeff'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText(pd.name,px,py+sp.r+22); ctx.restore();
  }
  drawSpaceRocket(ship.x,ship.y,ship.angle,keys['ArrowUp']);
  drawHUD();
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='14px Courier New';
  ctx.fillText('↑ Schub  |  ← → Drehen  |  Planeten annähern zum Landen',W/2,H-12);
  if(approachCooldown>0){
    ctx.fillStyle='rgba(255,200,80,0.7)'; ctx.font='bold 14px Courier New';
    ctx.fillText('Triebwerke kühlen ab... '+Math.ceil(approachCooldown/60)+'s',W/2,H-32);
  }
}

// ─── APPROACHING ─────────────────────────────────────────────────
function renderApproaching(){
  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  drawStars(1-approachT*0.5);
  const pd=PLANET_DATA[approachPlanet.id];
  const r=approachPlanet.r*(1+approachT*14);
  const pg=ctx.createRadialGradient(W/2-r*0.3,H/2-r*0.3,0,W/2,H/2,r);
  pg.addColorStop(0,pd.accent); pg.addColorStop(1,pd.color);
  ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(W/2,H/2,r,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.globalAlpha=approachT;
  ctx.fillStyle='#fff'; ctx.font='bold 28px Courier New'; ctx.textAlign='center';
  ctx.fillText('Landung: '+pd.name,W/2,50);
  ctx.fillStyle='#adf'; ctx.font='18px Courier New'; ctx.fillText('Level '+level,W/2,80);
  ctx.restore();
}

// ─── SURFACE ─────────────────────────────────────────────────────
function renderSurface(){
  const pd=PLANET_DATA[currentPlanet];
  const gy=groundY();
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,pd.skyTop); sky.addColorStop(1,pd.skyBot);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  if(currentPlanet!=='earth') drawStars(0.6);
  if(currentPlanet==='earth'){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<3;i++){
      const cx=((i*340+frame*0.15)%(W+80))-40;
      ctx.beginPath(); ctx.ellipse(cx,80+i*50,55,22,0,0,Math.PI*2); ctx.fill();
    }
  }
  if(currentPlanet==='magma'){
    // Lava glow at ground
    const fog=ctx.createLinearGradient(0,gy-80,0,gy);
    fog.addColorStop(0,'transparent'); fog.addColorStop(1,'rgba(160,40,0,0.5)');
    ctx.fillStyle=fog; ctx.fillRect(0,gy-80,W,80);
    // Lava light flicker
    ctx.fillStyle=`rgba(255,80,0,${0.04+Math.sin(frame*0.08)*0.03})`;
    ctx.fillRect(0,0,W,H);
  }

  ctx.save();
  ctx.translate(-camX,0);

  // Ground
  const gg=ctx.createLinearGradient(0,gy-12,0,H);
  gg.addColorStop(0,pd.groundTop); gg.addColorStop(0.1,pd.ground); gg.addColorStop(1,'#111');
  ctx.fillStyle=gg; ctx.fillRect(0,gy-12,WORLD_W,H-gy+12);
  ctx.fillStyle=pd.groundTop;
  for(let x=0;x<WORLD_W;x+=22) ctx.fillRect(x,gy-14,10,6);

  // Lucky tree
  drawLuckyTree(luckyTree.x,gy);

  // Earth-only: house, kiosk & treasure chest
  if(currentPlanet==='earth'){
    drawHouse(1130, gy);
    drawKioskBuilding(1320, gy);
    drawChest(1490, gy, false);  // Immer sichtbar
  }

  // Platforms
  for(const pl of platforms){
    ctx.fillStyle=pd.ground; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle=pd.groundTop; ctx.fillRect(pl.x,pl.y,pl.w,6);
  }
  // Question blocks + coin pickups (Mario-style)
  drawQuestionBlocks();
  drawCoinPickups();

  // Magma holes
  if(currentPlanet==='magma'){
    for(const h of magmaHoles){
      const lg=ctx.createLinearGradient(h.x,h.y,h.x,h.y+h.h+20);
      lg.addColorStop(0,'#ff6600'); lg.addColorStop(0.5,'#ff2200'); lg.addColorStop(1,'#440000');
      ctx.fillStyle=lg; ctx.fillRect(h.x,h.y,h.w,h.h+20);
      // Lava bubbles
      if(frame%15===0){
        hitFX.push({x:h.x+Math.random()*h.w,y:h.y+2,vx:(Math.random()-.5)*1.5,vy:-Math.random()*2-0.5,life:20,color:'#ff8800'});
      }
    }
    // Castle
    drawMagmaCastle(gy);
    // Magma monsters
    for(const m of magmaMonsters) drawMagmaMonster(m);
  }

  // Surface rocket
  drawRocket(srkt.x+srkt.w/2,srkt.y+srkt.h*0.7,0,false);

  // Hero
  if(!inRocket) drawHero2(hero.x,hero.y);

  // Regular monsters + mini-bosses
  for(const m of monsters){
    if(m.isMiniBoss) drawMiniBoss(m);
    else drawMonster(m, m.x);
  }

  // Player projectiles
  for(const p of pProjectiles){
    const wg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    wg.addColorStop(0,'rgba(200,240,255,1)'); wg.addColorStop(0.5,'rgba(80,180,255,0.8)'); wg.addColorStop(1,'rgba(40,120,255,0.2)');
    ctx.fillStyle=wg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(p.x-p.vx*1.5,p.y,p.r*0.6,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  }
  // Monster projectiles
  for(const p of mProjectiles){
    const mg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    mg.addColorStop(0,'#ffe040'); mg.addColorStop(0.5,'#ff6000'); mg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }

  drawFX();
  ctx.restore(); // end camX

  drawHUD();
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='13px Courier New';
  if(inRocket) ctx.fillText('A: Aussteigen  |  ↑: Abheben',W/2,H-12);
  else ctx.fillText('← → Laufen  |  SPACE Springen  |  W Wasser  |  S Schild  |  A Rakete',W/2,H-12);
  ctx.fillStyle='#cdf'; ctx.font='14px Courier New'; ctx.textAlign='left';
  ctx.fillText(pd.name,12,H-12);
  if(currentPlanet==='monster'&&monsters.length>0){
    ctx.textAlign='center'; ctx.fillStyle='#f88'; ctx.font='bold 16px Courier New';
    ctx.fillText('👾 Monster übrig: '+monsters.length,W/2,36+16);
  }
  if(currentPlanet==='magma'){
    ctx.textAlign='center'; ctx.fillStyle='#f84'; ctx.font='bold 15px Courier New';
    ctx.fillText('🌋 Magmaplanet  |  Betritt die Monsterburg!',W/2,36+16);
  }
  if(currentPlanet==='earth' && !inRocket){
    const KIOSK_X=1320;
    // Wegweiser (immer sichtbar auf der Erde)
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='12px Courier New'; ctx.textAlign='center';
    ctx.fillText('🏠(1130)  🛒(1320)  🎁(1490)  🚀Rakete',W/2,H-32);
    // Show hero position so player knows where they are
    ctx.fillStyle='rgba(180,220,255,0.7)'; ctx.font='12px monospace'; ctx.textAlign='right';
    ctx.fillText('Pos: '+Math.floor(hero.x), W-10, H-32);
    // Arrow toward chest if not near it
    const heroPosX = hero.x - camX;  // screen position
    const chestScreenX = 900 - camX;
    if(Math.abs(hero.x-1490)>65){
      const arrowDir = hero.x<900?1:-1;
      const arrowX = arrowDir>0 ? Math.min(W-60, heroPosX+80) : Math.max(60, heroPosX-80);
      ctx.fillStyle=`rgba(255,215,0,${0.6+Math.sin(frame*0.15)*0.4})`;
      ctx.font='bold 22px Arial'; ctx.textAlign='center';
      ctx.fillText(arrowDir>0?'🎁 →':'← 🎁', arrowX, H-55);
    }
    if(Math.abs(hero.x-KIOSK_X)<65&&!kioskOpen){
      ctx.fillStyle='rgba(255,215,0,0.95)'; ctx.font='bold 14px Courier New'; ctx.textAlign='center';
      ctx.fillText('K: Kiosk öffnen (Upgrades für 100 👑)',W/2,H-50);
    }
  }

  // In-game dialog
  renderDialog();
  // Math quiz overlay
  renderMathQuiz();
  // Kiosk overlay
  renderKiosk();

  // "H" key hint near house on Earth (proximity label drawn in drawHouse already)
  // "O" key hint near chest handled in drawChest
  // DEBUG: show key states on earth
  if(currentPlanet==='earth' && !inRocket){
    ctx.fillStyle='rgba(255,255,0,0.9)'; ctx.font='11px monospace'; ctx.textAlign='left';
    const debugKeys=['KeyE','KeyO','KeyH','KeyK','KeyF'];
    const active=debugKeys.filter(k=>keys[k]);
    ctx.fillText('keys: ['+active.join(',')+'] cd:'+interactCooldown+' hx:'+Math.floor(hero.x), 10, H-60);
    const CHEST_X=1490,KIOSK_X=1320,HOUSE_X=1130;
    ctx.fillText('near chest:'+(Math.abs(hero.x-CHEST_X)<65)+' kiosk:'+(Math.abs(hero.x-KIOSK_X)<65)+' house:'+(Math.abs(hero.x-HOUSE_X)<65), 10, H-48);
  }

}

// ─── MAGMA CASTLE ────────────────────────────────────────────────
function drawMagmaCastle(gy){
  const cx=CASTLE_X, cw=CASTLE_W, ch=220;
  const cy=gy-ch;

  // Castle wall
  ctx.fillStyle='#3a1000';
  ctx.fillRect(cx,cy,cw,ch);
  // Battlements
  ctx.fillStyle='#2a0800';
  for(let i=0;i<10;i++) ctx.fillRect(cx+i*(cw/10),cy-24,cw/10-6,24);

  // Towers
  for(const tx of [cx-30, cx+cw-40]){
    ctx.fillStyle='#2a0800'; ctx.fillRect(tx,cy-40,70,ch+40);
    for(let i=0;i<3;i++) ctx.fillRect(tx+i*20,cy-60,16,22);
    // Tower windows
    ctx.fillStyle='#ff4400'; ctx.fillRect(tx+20,cy+20,28,40);
    ctx.fillStyle='rgba(255,100,0,0.5)'; ctx.fillRect(tx+20,cy+20,28,40);
  }

  // Windows (glowing)
  ctx.fillStyle='#ff4400';
  for(let i=0;i<3;i++){
    ctx.fillRect(cx+80+i*160,cy+30,40,60);
    ctx.fillStyle='rgba(255,80,0,0.4)'; ctx.fillRect(cx+80+i*160,cy+30,40,60); ctx.fillStyle='#ff4400';
  }

  // Gate (left entrance)
  ctx.fillStyle='#1a0500'; ctx.fillRect(cx+30,gy-100,60,100);
  ctx.fillStyle='#ff4400'; ctx.beginPath(); ctx.arc(cx+60,gy-100,30,Math.PI,0); ctx.fill();
  // Drawbridge
  if(drawbridgeDown){
    ctx.fillStyle='#5a2a00'; ctx.save();
    ctx.translate(cx+30,gy-100);
    ctx.fillRect(0,0,60,80);
    ctx.restore();
  } else {
    ctx.fillStyle='#5a2a00'; ctx.fillRect(cx+30,gy-180,60,80);
  }
  // Moat (lava)
  const mg=ctx.createLinearGradient(MOAT_X,gy-30,MOAT_X,gy);
  mg.addColorStop(0,'#ff6600'); mg.addColorStop(1,'#880000');
  ctx.fillStyle=mg; ctx.fillRect(MOAT_X,gy-30,MOAT_W,30);
  ctx.fillStyle='rgba(255,120,0,0.5+Math.sin(frame*0.1)*0.1)';
  ctx.fillRect(MOAT_X,gy-30,MOAT_W,4);
  // "MOAT" label
  ctx.fillStyle='rgba(255,100,0,0.7)'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText('⚠ LAVAGRABEN',MOAT_X+MOAT_W/2,gy-35);

  // Right entrance label
  ctx.fillStyle='rgba(100,255,100,0.8)'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
  ctx.fillText('▲ Rechter Eingang',cx+cw-30,gy-130);

  // Castle sign
  ctx.fillStyle='#ffd700'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
  ctx.fillText('🏰 MONSTERBURG',cx+cw/2,cy+18);
}

// ─── BOSS FIGHT ──────────────────────────────────────────────────
function renderBoss(){
  // Dark castle interior
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0005'); bg.addColorStop(1,'#1a0008');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Floor
  ctx.fillStyle='#2a0010'; ctx.fillRect(0,H-80,W,80);
  ctx.fillStyle='#3a0015';
  for(let i=0;i<W;i+=80){ ctx.fillRect(i,H-80,78,78); }

  // Torch fires
  for(let i=0;i<4;i++){
    const tx=80+i*(W-160)/3, ty=H-180;
    ctx.fillStyle='#330'; ctx.fillRect(tx-4,ty,8,40);
    const flicker=0.6+Math.sin(frame*0.15+i)*0.4;
    ctx.fillStyle=`rgba(255,${Math.floor(100+flicker*80)},0,${flicker})`;
    ctx.beginPath(); ctx.arc(tx,ty,14+Math.sin(frame*0.2+i)*4,0,Math.PI*2); ctx.fill();
  }

  // Boss health bar (top center)
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(W/2-160,60,320,24);
  const hpPct=(boss.maxHp-boss.hits)/boss.maxHp;
  const hbg=ctx.createLinearGradient(W/2-160,0,W/2+160,0);
  hbg.addColorStop(0,'#f00'); hbg.addColorStop(0.5,'#fa0'); hbg.addColorStop(1,'#ff0');
  ctx.fillStyle=hbg; ctx.fillRect(W/2-160,60,320*hpPct,24);
  ctx.strokeStyle='#f00'; ctx.lineWidth=2;
  ctx.strokeRect(W/2-160,60,320,24);
  ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
  ctx.fillText(`👿 MONSTERBOSS  HP: ${boss.maxHp-boss.hits}/${boss.maxHp}`,W/2,78);

  // Boss sprite
  if(!boss.dead){
    drawBossSprite(boss.x, boss.y);
  }

  // Boss explosions
  for(const p of bossExplosions){
    ctx.globalAlpha=p.life/60; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Hero (2D boss room mode)
  drawHero2(hero.x,hero.y);

  // Player projectiles
  for(const p of pProjectiles){
    const wg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    wg.addColorStop(0,'rgba(200,240,255,1)'); wg.addColorStop(0.5,'rgba(80,180,255,0.8)'); wg.addColorStop(1,'transparent');
    ctx.fillStyle=wg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  // Boss projectiles
  for(const p of bossProjectiles){
    const bg2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    bg2.addColorStop(0,'#fff'); bg2.addColorStop(0.3,'#ff4400'); bg2.addColorStop(1,'transparent');
    ctx.fillStyle=bg2; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }

  drawFX();
  drawHUD();
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='13px monospace';
  ctx.fillText('W: Wasser schießen  |  SPACE: Springen  |  S: Schild',W/2,H-12);
}

function drawBossSprite(bx,by){
  const pulse=Math.sin(frame*0.07)*4;
  ctx.save(); ctx.translate(bx+boss.w/2, by);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0,boss.h+5,boss.w*0.6,12,0,0,Math.PI*2); ctx.fill();

  // Body
  const bodyG=ctx.createRadialGradient(-10,-10,0,0,boss.h/2,boss.w);
  bodyG.addColorStop(0,'#7a0000'); bodyG.addColorStop(1,'#2a0000');
  ctx.fillStyle=bodyG;
  ctx.beginPath(); ctx.roundRect(-boss.w/2,0,boss.w,boss.h,12); ctx.fill();

  // Armor plates
  ctx.fillStyle='#3a0800';
  ctx.fillRect(-boss.w/2+4,boss.h*0.25,boss.w-8,boss.h*0.12);
  ctx.fillRect(-boss.w/2+4,boss.h*0.45,boss.w-8,boss.h*0.12);

  // Spikes on top
  ctx.fillStyle='#600';
  for(let i=0;i<5;i++){
    const sx=-boss.w/2+10+i*20;
    ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx+7,-16-pulse); ctx.lineTo(sx+14,0); ctx.closePath(); ctx.fill();
  }

  // Sword on back (right side)
  ctx.save();
  ctx.translate(boss.w/2-8, 10);
  ctx.rotate(-0.3);
  ctx.fillStyle='#888'; ctx.fillRect(-4,-50,8,60); // blade
  ctx.fillStyle='#ffd700'; ctx.fillRect(-14,-2,28,8); // crossguard
  ctx.fillStyle='#8B4513'; ctx.fillRect(-3,8,6,16); // handle
  ctx.restore();

  // Cannon (left arm)
  ctx.save();
  ctx.translate(-boss.w/2+8, boss.h*0.4);
  ctx.rotate(0.2+Math.sin(frame*0.04)*0.15);
  ctx.fillStyle='#555'; ctx.fillRect(-6,-12,50,14);
  ctx.fillStyle='#333'; ctx.fillRect(-6,-15,16,20);
  ctx.fillStyle='#777'; ctx.beginPath(); ctx.arc(44,-5,7,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Eyes
  const eyeG1=ctx.createRadialGradient(-22,22+pulse*0.2,0,-22,22,14);
  eyeG1.addColorStop(0,'#ff8800'); eyeG1.addColorStop(1,'#cc0000');
  ctx.fillStyle=eyeG1; ctx.beginPath(); ctx.arc(-22,22,14,0,Math.PI*2); ctx.fill();
  const eyeG2=ctx.createRadialGradient(22,22+pulse*0.2,0,22,22,14);
  eyeG2.addColorStop(0,'#ff8800'); eyeG2.addColorStop(1,'#cc0000');
  ctx.fillStyle=eyeG2; ctx.beginPath(); ctx.arc(22,22,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-22,22,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22,22,6,0,Math.PI*2); ctx.fill();
  // eye glow
  ctx.fillStyle=`rgba(255,80,0,${0.3+Math.sin(frame*0.1)*0.2})`;
  ctx.beginPath(); ctx.arc(-22,22,18,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22,22,18,0,Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle='#f00'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,boss.h*0.65,18,0,Math.PI); ctx.stroke();
  ctx.fillStyle='#fff';
  for(let i=-3;i<=3;i++) ctx.fillRect(i*7-3,boss.h*0.6,5,10);

  // Crown
  ctx.fillStyle='#ffd700';
  ctx.beginPath(); ctx.moveTo(-20,-14); ctx.lineTo(-20,-28); ctx.lineTo(-10,-20); ctx.lineTo(0,-30+pulse); ctx.lineTo(10,-20); ctx.lineTo(20,-28); ctx.lineTo(20,-14); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f00'; ctx.beginPath(); ctx.arc(0,-28,4,0,Math.PI*2); ctx.fill();

  // Phase indicator
  if(boss.phase>0){
    ctx.fillStyle=boss.phase===2?'rgba(255,50,50,0.3)':'rgba(255,150,0,0.2)';
    ctx.beginPath(); ctx.arc(0,boss.h/2,boss.w*0.7,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ─── BOSS WIN ────────────────────────────────────────────────────
function renderBossWin(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawStars(0.5);
  // Remaining explosions
  for(const p of explosionFX){
    ctx.globalAlpha=p.life/80; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x+W/2-boss.x-boss.w/2,p.y+H/2-boss.y-boss.h/2,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  const alpha=Math.min(1,bossWinTimer/60);
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.min(W*0.06,48)}px Courier New`;
  ctx.textAlign='center'; ctx.shadowColor='#fa0'; ctx.shadowBlur=30;
  ctx.fillText('🏆 Du hast es geschafft!',W/2,H/2-60);
  ctx.fillText('Der Monsterboss ist besiegt!',W/2,H/2-10);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700'; ctx.font='bold 32px Arial';
  ctx.fillText(`+30 👑 KRONEN!`,W/2,H/2+50);
  ctx.fillStyle='#adf'; ctx.font='18px Courier New';
  ctx.fillText('Du fliegst zurück zur Erde...',W/2,H/2+100);
  ctx.restore();
  drawHUD();
}

// ─── GAME OVER ───────────────────────────────────────────────────
let goShown=false;
function renderGameOver(){
  if(!goShown){ goShown=true; setTimeout(()=>showNameInput(),300); }
  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  drawStars(0.4);
  ctx.textAlign='center'; ctx.fillStyle='#ff4444'; ctx.font=`bold ${Math.min(W*0.09,68)}px Courier New`;
  ctx.shadowColor='#f00'; ctx.shadowBlur=30; ctx.fillText('GAME OVER',W/2,H/2-60); ctx.shadowBlur=0;
  ctx.fillStyle='#adf'; ctx.font='22px Courier New';
  ctx.fillText(`Level ${Math.min(level,100)}  |  👑 ${crowns} Kronen`,W/2,H/2);
}

// ─── LEADERBOARD ─────────────────────────────────────────────────
function renderBoard(){
  goShown=false;
  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  drawStars(0.5);
  ctx.textAlign='center'; ctx.fillStyle='#ffd700'; ctx.font='bold 36px Courier New';
  ctx.shadowColor='#fa0'; ctx.shadowBlur=20; ctx.fillText('🏆 BESTENLISTE',W/2,68); ctx.shadowBlur=0;
  const medals=['🥇','🥈','🥉'];
  const top=leaderboard.slice(0,10);
  top.forEach((e,i)=>{
    const y=122+i*46;
    ctx.fillStyle=i===0?'rgba(255,215,0,0.12)':i===1?'rgba(192,192,192,0.1)':i===2?'rgba(205,127,50,0.1)':'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.roundRect(W/2-280,y-28,560,40,8); ctx.fill();
    ctx.fillStyle=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#99b';
    ctx.font=i<3?'bold 19px Courier New':'16px Courier New';
    ctx.fillText(`${i<3?medals[i]:(i+1)+'.'} ${e.name.padEnd(12)} Lv.${String(e.level).padStart(3)} 👑${e.crowns}`,W/2,y);
  });
  if(!top.length){ ctx.fillStyle='#556'; ctx.font='20px Courier New'; ctx.fillText('Noch keine Einträge',W/2,200); }
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='16px Courier New';
  ctx.fillText('ENTER / SPACE → Menü',W/2,H-30);
}

// ═══════════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════════
let prevGs=gs;
function loop(){
  if(gs===S.GAMEOVER&&prevGs!==S.GAMEOVER) goShown=false;
  prevGs=gs;
  update(); render();
  requestAnimationFrame(loop);
}

// Start – music deferred to first user interaction (browser policy)
function firstInteraction() {
  document.removeEventListener('click',  firstInteraction);
  document.removeEventListener('keydown', firstInteraction);
  if (!muted) startMusic();
}
document.addEventListener('click',   firstInteraction);
document.addEventListener('keydown', firstInteraction);

// Wrap loop in try/catch so errors don't silently kill the game
function safeLoop() {
  try { loop(); } catch(e) { console.error('Game loop error:', e); requestAnimationFrame(safeLoop); }
}
requestAnimationFrame(safeLoop);
